<!-- Real-time Account Status Monitor -->
<!-- Automatically logs out user if their account is disabled -->
<script type="module">
  import { db } from '/static/js/firebase-config.js';
  import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  (async function() {
    try {
      // Get current user's email from session
      const sessionResponse = await fetch('/api/check-session', {
        method: 'GET',
        credentials: 'same-origin'
      });
      
      if (!sessionResponse.ok) return;
      
      const sessionData = await sessionResponse.json();
      if (!sessionData.authenticated || !sessionData.email) return;
      
      const userEmail = sessionData.email;
      
      // Set up real-time listener for user's account status
      const usersRef = collection(db, 'users');
      const q = query(usersRef, where('email', '==', userEmail));
      
      onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          // User account was deleted
          console.log('Account was deleted. Logging out...');
          logout();
          return;
        }
        
        snapshot.forEach((doc) => {
          const userData = doc.data();
          const status = userData.status || '';
          
          // Check if account is disabled
          if (status === 'Disabled') {
            console.log('Account has been disabled. Logging out...');
            alert('Your account has been disabled by an administrator. You will be logged out.');
            logout();
          }
        });
      }, (error) => {
        console.error('Error monitoring account status:', error);
      });
      
    } catch (error) {
      console.error('Error setting up account monitor:', error);
    }
  })();
  
  function logout() {
    // Call logout endpoint to clear session
    fetch('/api/logout', {
      method: 'POST',
      credentials: 'same-origin'
    })
    .then(() => {
      window.location.replace('/login');
    })
    .catch(() => {
      // Force redirect even if logout fails
      window.location.replace('/login');
    });
  }
</script>
