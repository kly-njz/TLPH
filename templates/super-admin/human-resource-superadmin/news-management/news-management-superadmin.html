<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>News Management | Super Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <style>
    body { font-family: 'Verdana', 'Arial', sans-serif; background: #f1f5f9; font-size: 11px; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-slate-50">
  <div class="fixed left-0 top-0 h-full z-[1060] hidden lg:block w-[260px] no-print">
    {% include 'super-admin/sidenav-superadmin.html' %}
  </div>
  <div class="fixed top-0 w-full lg:w-[calc(100%-260px)] lg:left-[260px] z-[1050] no-print">
    {% include 'super-admin/header-superadmin.html' %}
  </div>

  <main class="absolute top-[50px] right-0 bottom-0 left-0 lg:left-[260px] p-4 overflow-y-auto custom-scrollbar">
    <div class="max-w-[1500px] mx-auto">
      <section class="bg-white border border-slate-300 rounded-[2px] p-4">
        <h1 class="text-[14px] font-black text-emerald-900 uppercase tracking-widest mb-4">News & Updates Management</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <div class="bg-white rounded-[2px] border border-slate-200 p-3 flex flex-col">
            <div class="h-[140px] bg-slate-100 rounded overflow-hidden mb-3 flex items-center justify-center text-slate-400 text-xs font-bold uppercase">
              Preview Image
            </div>
              <label class="text-[9px] font-bold text-slate-500 uppercase tracking-wide">Title</label>
              <input type="text" title="News title" placeholder="Enter title" class="font-bold text-[12px] text-slate-800 mb-2 border-b border-slate-200 focus:border-emerald-600 outline-none bg-transparent" value="DENR Encourages Youth Participation in Environmental Efforts">
              <label class="text-[9px] font-bold text-slate-500 uppercase tracking-wide">Summary</label>
              <textarea title="News summary" placeholder="Enter short summary" class="text-[10px] text-slate-600 border-b border-slate-100 focus:border-emerald-600 outline-none bg-transparent mb-2" rows="2">Protecting, Conserving, and Managing the Environment for Future Generations</textarea>
              <label class="text-[9px] font-bold text-slate-500 uppercase tracking-wide">Publish Date</label>
              <input type="date" title="Publish date" class="text-[10px] text-slate-500 border-b border-slate-100 focus:border-emerald-600 outline-none bg-transparent mb-2" value="2026-03-26">
              <label class="text-[9px] font-bold text-slate-500 uppercase tracking-wide">Image</label>
              <input type="file" title="Upload image" class="text-[10px] mt-2">
            <div class="flex gap-2 mt-4">
              <button class="px-3 py-1 bg-emerald-700 text-white rounded-[2px] text-[9px] font-bold uppercase tracking-widest hover:bg-emerald-800">Save</button>
              <button class="px-3 py-1 bg-rose-100 text-rose-700 rounded-[2px] text-[9px] font-bold uppercase tracking-widest hover:bg-rose-200">Delete</button>
            </div>
          </div>

          <div class="flex items-center justify-center border-2 border-dashed border-emerald-300 rounded-[2px] cursor-pointer hover:bg-emerald-50 transition-colors min-h-[240px]">
            <button class="text-emerald-700 font-bold text-[12px] flex flex-col items-center py-8 w-full uppercase tracking-widest">
              <span class="material-icons-round text-4xl mb-2">add_circle</span>
              Add News Card
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
