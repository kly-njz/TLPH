<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>News Management | Super Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <style>
    body { font-family: 'Verdana', 'Arial', sans-serif; background: #f1f5f9; font-size: 11px; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-slate-50">
  <div class="fixed left-0 top-0 h-full z-[1060] hidden lg:block w-[260px] no-print">
    {% include 'super-admin/sidenav-superadmin.html' %}
  </div>
  <div class="fixed top-0 w-full lg:w-[calc(100%-260px)] lg:left-[260px] z-[1050] no-print">
    {% include 'super-admin/header-superadmin.html' %}
  </div>

  <main class="absolute top-[50px] right-0 bottom-0 left-0 lg:left-[260px] p-4 overflow-y-auto custom-scrollbar">
    <div class="max-w-[1500px] mx-auto">
      <section class="bg-white border border-slate-300 rounded-[2px] p-4 space-y-4">
        <div class="flex items-center justify-between gap-2 flex-wrap">
          <h1 class="text-[14px] font-black text-emerald-900 uppercase tracking-widest">News & Updates Management</h1>
          <button id="newBtn" class="px-3 py-1 bg-emerald-700 text-white rounded-[2px] text-[9px] font-bold uppercase tracking-widest hover:bg-emerald-800">
            New News Item
          </button>
        </div>

        <form id="newsForm" class="border border-slate-200 rounded-[2px] p-3 bg-slate-50 space-y-2">
          <input type="hidden" id="newsId" />
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label for="title" class="block text-[9px] font-bold text-slate-500 uppercase tracking-wide">Title</label>
              <input id="title" type="text" title="News title" placeholder="Enter title" class="w-full h-8 px-2 border border-slate-300 rounded-[2px] text-[11px]" required />
            </div>
            <div>
              <label for="publishedDate" class="block text-[9px] font-bold text-slate-500 uppercase tracking-wide">Publish Date</label>
              <input id="publishedDate" type="date" title="Publish date" class="w-full h-8 px-2 border border-slate-300 rounded-[2px] text-[11px]" />
            </div>
          </div>
          <div>
            <label for="summary" class="block text-[9px] font-bold text-slate-500 uppercase tracking-wide">Summary</label>
            <textarea id="summary" title="News summary" placeholder="Enter short summary" rows="3" class="w-full px-2 py-1 border border-slate-300 rounded-[2px] text-[11px]" required></textarea>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label for="imageUrl" class="block text-[9px] font-bold text-slate-500 uppercase tracking-wide">Image URL</label>
              <input id="imageUrl" type="text" title="Image URL" placeholder="/static/images/news1.jpg or https://..." class="w-full h-8 px-2 border border-slate-300 rounded-[2px] text-[11px]" />
              <div class="mt-2 flex items-center gap-2 flex-wrap">
                <input id="imageFile" type="file" title="News image file" accept="image/*" class="text-[10px] text-slate-600" />
                <button id="uploadImageBtn" type="button" class="px-2 py-1 border border-slate-300 bg-white rounded-[2px] text-[9px] font-bold uppercase tracking-widest hover:bg-slate-100">Upload to Cloudinary</button>
                <span id="imageUploadStatus" class="text-[9px] font-bold uppercase tracking-wide text-slate-500"></span>
              </div>
            </div>
            <div class="flex items-end">
              <label class="inline-flex items-center gap-2 text-[10px] font-bold text-slate-600 uppercase tracking-wide">
                <input id="isPublished" type="checkbox" checked />
                Published on Landing Page
              </label>
            </div>
          </div>
          <div class="flex gap-2">
            <button type="submit" class="px-3 py-1 bg-emerald-700 text-white rounded-[2px] text-[9px] font-bold uppercase tracking-widest hover:bg-emerald-800">Save</button>
            <button id="resetBtn" type="button" class="px-3 py-1 border border-slate-300 bg-white rounded-[2px] text-[9px] font-bold uppercase tracking-widest hover:bg-slate-100">Reset</button>
          </div>
        </form>

        <div class="border border-slate-200 rounded-[2px] overflow-hidden">
          <table class="w-full text-left border-collapse">
            <thead class="bg-slate-100">
              <tr>
                <th class="text-[9px] uppercase font-black p-2 border-b border-slate-200">Title</th>
                <th class="text-[9px] uppercase font-black p-2 border-b border-slate-200">Date</th>
                <th class="text-[9px] uppercase font-black p-2 border-b border-slate-200">Published</th>
                <th class="text-[9px] uppercase font-black p-2 border-b border-slate-200">Actions</th>
              </tr>
            </thead>
            <tbody id="newsRows" class="bg-white"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const newsRows = document.getElementById('newsRows');
    const newsForm = document.getElementById('newsForm');
    const newBtn = document.getElementById('newBtn');
    const resetBtn = document.getElementById('resetBtn');

    const newsId = document.getElementById('newsId');
    const titleInput = document.getElementById('title');
    const summaryInput = document.getElementById('summary');
    const publishedDateInput = document.getElementById('publishedDate');
    const imageUrlInput = document.getElementById('imageUrl');
    const imageFileInput = document.getElementById('imageFile');
    const uploadImageBtn = document.getElementById('uploadImageBtn');
    const imageUploadStatus = document.getElementById('imageUploadStatus');
    const isPublishedInput = document.getElementById('isPublished');

    let items = [];

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function resetForm() {
      newsId.value = '';
      titleInput.value = '';
      summaryInput.value = '';
      publishedDateInput.value = '';
      imageUrlInput.value = '';
      imageFileInput.value = '';
      imageUploadStatus.textContent = '';
      isPublishedInput.checked = true;
    }

    function fillForm(item) {
      newsId.value = item.id;
      titleInput.value = item.title || '';
      summaryInput.value = item.summary || '';
      publishedDateInput.value = item.published_date || '';
      imageUrlInput.value = item.image_url || '';
      imageFileInput.value = '';
      imageUploadStatus.textContent = '';
      isPublishedInput.checked = !!item.is_published;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function uploadSelectedImage() {
      const file = imageFileInput.files && imageFileInput.files[0];
      if (!file) {
        alert('Select an image file first.');
        return;
      }

      uploadImageBtn.disabled = true;
      imageUploadStatus.textContent = 'Uploading...';

      try {
        const formData = new FormData();
        formData.append('image', file);

        const res = await fetch('/superadmin/api/hrm/news/upload-image', {
          method: 'POST',
          body: formData,
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Failed to upload image');

        imageUrlInput.value = (data.image_url || '').trim();
        imageUploadStatus.textContent = 'Uploaded';
      } catch (err) {
        imageUploadStatus.textContent = 'Upload failed';
        alert(err.message || 'Failed to upload image');
      } finally {
        uploadImageBtn.disabled = false;
      }
    }

    function renderRows() {
      if (!items.length) {
        newsRows.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-[10px] text-slate-500 uppercase font-bold">No news items yet</td></tr>';
        return;
      }

      newsRows.innerHTML = items.map((item) => {
        return `
          <tr class="border-b border-slate-100">
            <td class="p-2 text-[11px] font-bold text-slate-800">${escapeHtml(item.title)}</td>
            <td class="p-2 text-[10px] text-slate-600">${escapeHtml(item.published_date || 'N/A')}</td>
            <td class="p-2 text-[10px]">
              <span class="px-2 py-0.5 rounded-[2px] border text-[9px] font-bold uppercase ${item.is_published ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-600 border-slate-300'}">
                ${item.is_published ? 'Published' : 'Hidden'}
              </span>
            </td>
            <td class="p-2 text-[10px]">
              <button class="edit-btn px-2 py-1 border border-slate-300 rounded-[2px] font-bold uppercase mr-1" data-id="${item.id}">Edit</button>
              <button class="delete-btn px-2 py-1 border border-rose-200 bg-rose-50 text-rose-700 rounded-[2px] font-bold uppercase" data-id="${item.id}">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function loadItems() {
      try {
        const res = await fetch('/superadmin/api/hrm/news');
        const payload = await res.json();
        if (!res.ok || !payload.success) throw new Error(payload.error || 'Failed to load news');
        items = Array.isArray(payload.items) ? payload.items : [];
        renderRows();
      } catch (err) {
        alert(err.message || 'Failed to load news');
      }
    }

    async function saveItem(evt) {
      evt.preventDefault();
      const id = newsId.value.trim();
      const payload = {
        title: titleInput.value.trim(),
        summary: summaryInput.value.trim(),
        published_date: publishedDateInput.value,
        image_url: imageUrlInput.value.trim(),
        is_published: isPublishedInput.checked,
      };

      const url = id ? `/superadmin/api/hrm/news/${encodeURIComponent(id)}` : '/superadmin/api/hrm/news';
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Failed to save news');
        resetForm();
        await loadItems();
      } catch (err) {
        alert(err.message || 'Failed to save news');
      }
    }

    async function deleteItem(id) {
      if (!confirm('Delete this news item?')) return;
      try {
        const res = await fetch(`/superadmin/api/hrm/news/${encodeURIComponent(id)}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Failed to delete news');
        if (newsId.value === id) resetForm();
        await loadItems();
      } catch (err) {
        alert(err.message || 'Failed to delete news');
      }
    }

    newsRows.addEventListener('click', (evt) => {
      const editBtn = evt.target.closest('.edit-btn');
      if (editBtn) {
        const item = items.find((x) => x.id === editBtn.dataset.id);
        if (item) fillForm(item);
        return;
      }

      const deleteBtn = evt.target.closest('.delete-btn');
      if (deleteBtn) {
        deleteItem(deleteBtn.dataset.id);
      }
    });

    newBtn.addEventListener('click', resetForm);
    resetBtn.addEventListener('click', resetForm);
    uploadImageBtn.addEventListener('click', uploadSelectedImage);
    newsForm.addEventListener('submit', saveItem);

    loadItems();
  </script>
</body>
</html>
