<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }
  </style>
</head>
<body class="bg-transparent">

  <header class="fixed left-0 top-0 z-50 flex h-[72px] w-full items-center justify-between border-b border-slate-300 bg-white px-6 shadow-sm">
    
    <div class="flex items-center gap-4">
      <div class="flex h-10 w-10 items-center justify-center rounded bg-green-800 text-white shadow-inner">
        <span class="material-icons-round text-[24px]">admin_panel_settings</span>
      </div>
      <div class="border-l-2 border-slate-200 pl-4">
        <div class="flex items-center gap-2">
            <h1 class="text-lg font-black tracking-tight text-slate-900 uppercase">Super Admin Portal</h1>
            <span class="rounded bg-red-100 px-2 py-0.5 text-[9px] font-black text-red-700 uppercase tracking-widest border border-red-200">Level 5 Clearance</span>
        </div>
        <p class="text-[10px] font-bold uppercase tracking-[0.15em] text-slate-500">Department of Environment and Natural Resources</p>
      </div>
    </div>

    <div class="flex items-center gap-6">
      
      <div class="relative hidden lg:block">
        <span class="material-icons-round absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
        <input type="text" placeholder="Search system records..." 
               class="w-80 rounded border border-slate-300 bg-slate-50 py-2 pl-9 pr-4 text-xs font-semibold text-slate-700 transition-all focus:border-green-700 focus:bg-white focus:outline-none focus:ring-1 focus:ring-green-700">
      </div>

      <div class="h-8 w-px bg-slate-300"></div>

      <div class="hidden text-right md:block">
        <p id="current-date" class="text-xs font-black text-slate-800 leading-none">-- --, ----</p>
        <p class="mt-1 text-[9px] font-bold text-slate-500 uppercase tracking-widest">Central Office • Manila</p>
      </div>

      <div class="flex items-center gap-3">
          <a href="/superadmin/superadmin-notification" class="group relative flex h-9 w-9 items-center justify-center rounded border border-slate-300 bg-slate-50 transition-all hover:border-green-700 hover:bg-green-50">
              <span class="material-icons-round text-[20px] text-slate-600 group-hover:text-green-800">notifications</span>
              <span class="absolute -right-1 -top-1 flex h-3.5 w-3.5 items-center justify-center rounded-full border-2 border-white bg-red-600 text-[8px] font-bold text-white">3</span>
          </a>
          
          <a href="/superadmin/superadmin-profile" title="View Profile" class="flex h-9 w-9 items-center justify-center rounded border border-slate-300 bg-slate-50 text-slate-600 transition-all hover:border-green-700 hover:bg-green-50 hover:text-green-800">
              <span class="material-icons-round text-[20px]">person</span>
          </a>
      </div>
    </div>
  </header>

  <script>
    function updateHeaderDate() {
      const dateEl = document.getElementById('current-date');
      const now = new Date();
      dateEl.innerText = now.toLocaleDateString('en-US', { 
        weekday: 'short', 
        month: 'short', 
        day: '2-digit',
        year: 'numeric'
      }).toUpperCase();
    }
    updateHeaderDate();
  </script>
</body>
</html>
