<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    /* Government Standard Typography & Layout (STRICT COMPACT) */
    body { font-family: 'Verdana', 'Arial', sans-serif; margin: 0; }
  </style>
</head>
<body class="bg-transparent">

  <header class="fixed top-0 left-0 lg:left-[260px] z-40 flex h-[50px] w-full lg:w-[calc(100%-260px)] items-center justify-between border-b border-slate-300 bg-white px-4 shadow-sm transition-all duration-300">
    
    <div class="flex items-center gap-3">
      <div class="flex h-7 w-7 items-center justify-center rounded-[2px] bg-slate-800 text-white shadow-inner shrink-0">
        <span class="material-icons-round text-[16px]">admin_panel_settings</span>
      </div>
      <div class="border-l-2 border-slate-200 pl-3 leading-tight">
        <div class="flex items-center gap-2">
            <h1 class="text-[12px] font-black tracking-tight text-slate-900 uppercase m-0">Superadmin Console</h1>
            <span class="rounded-[2px] bg-red-50 px-1.5 py-0.5 text-[8px] font-black text-red-700 uppercase tracking-widest border border-red-200 leading-none">Level 5</span>
        </div>
        <p class="text-[8px] font-bold uppercase tracking-[0.15em] text-slate-500 m-0 mt-0.5">Department of Environment and Natural Resources</p>
      </div>
    </div>

    <div class="flex items-center gap-4">
      
      <div class="relative hidden lg:block">
        <span class="material-icons-round absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-[14px]">search</span>
        <input type="text" placeholder="Search records..." 
              class="w-56 rounded-[2px] border border-slate-300 bg-slate-50 py-1 pl-7 pr-3 text-[10px] font-bold text-slate-700 transition-all focus:border-blue-700 focus:bg-white focus:outline-none">
      </div>

      <div class="h-6 w-px bg-slate-300 hidden md:block"></div>

      <div class="hidden text-right md:block">
        <div class="flex items-center justify-end gap-1.5 text-[10px] font-black text-slate-800 leading-none m-0">
            <span id="current-date">-- --, ----</span>
            <span class="text-slate-300 font-normal">|</span>
            <span id="current-time" class="font-mono tracking-tighter text-blue-800">--:--:-- --</span>
        </div>
        <p class="mt-0.5 text-[8px] font-bold text-slate-500 uppercase tracking-widest m-0">Central Office</p>
      </div>

      <div class="flex items-center gap-2">
          <a href="/superadmin/superadmin-notification" class="group relative flex h-7 w-7 items-center justify-center rounded-[2px] border border-slate-300 bg-slate-50 transition-all hover:border-blue-700 hover:bg-blue-50 no-underline">
              <span class="material-icons-round text-[16px] text-slate-600 group-hover:text-blue-800 transition-colors">notifications</span>
              <span id="notif-badge" class="absolute inset-1/2 -translate-x-1/2 -translate-y-1/2 flex h-3 w-3 items-center justify-center rounded-full border border-white bg-red-600 text-[7px] font-black text-white" style="display: none;">0</span>
          </a>
          
          <a href="/superadmin/superadmin-profile" title="View Profile" class="flex h-7 w-7 items-center justify-center rounded-[2px] border border-slate-300 bg-slate-50 text-slate-600 transition-all hover:border-blue-700 hover:bg-blue-50 hover:text-blue-800 no-underline">
              <span class="material-icons-round text-[16px]">person</span>
          </a>
      </div>
    </div>
  </header>

  <script>
    // --- REAL TIME CLOCK LOGIC ---
    function updateClock() {
      const now = new Date();
      
      // Update Date Element
      const dateEl = document.getElementById('current-date');
      if (dateEl) {
        dateEl.innerText = now.toLocaleDateString('en-US', { 
          weekday: 'short', 
          month: 'short', 
          day: '2-digit',
          year: 'numeric'
        }).toUpperCase();
      }

      // Update Time Element
      const timeEl = document.getElementById('current-time');
      if (timeEl) {
        timeEl.innerText = now.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        }).toUpperCase();
      }
    }
    
    // Initialize immediately, then interval every 1 second
    updateClock();
    setInterval(updateClock, 1000);
    // -----------------------------

    // Update notification badge count
    function updateNotificationBadge() {
      const unreadCount = parseInt(localStorage.getItem('superadmin_unread_notifs') || '0');
      const badge = document.getElementById('notif-badge');
      
      if (badge) {
        if (unreadCount > 0) {
          badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      }
    }

    // Initialize badge on page load
    updateNotificationBadge();

    // Listen for storage changes (when other tabs update the count)
    window.addEventListener('storage', function(e) {
      if (e.key === 'superadmin_unread_notifs') {
        updateNotificationBadge();
      }
    });
  </script>
</body>
</html>
