{% extends 'super-admin/base.html' %}
{% block content %}
<div class="p-6">
  <h1 class="text-2xl font-black text-emerald-900 mb-6 uppercase tracking-widest">News & Updates Management</h1>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- News Card Template -->
    <div class="bg-white rounded-lg shadow border border-slate-200 p-4 flex flex-col">
      <div class="aspect-w-16 aspect-h-9 bg-slate-100 rounded overflow-hidden mb-3">
        <img src="/static/images/news1.jpg" alt="News Image" class="object-cover w-full h-full">
      </div>
      <input type="text" class="font-bold text-lg text-slate-800 mb-2 border-b border-slate-200 focus:border-emerald-600 outline-none bg-transparent" value="DENR Encourages Youth Participation in Environmental Efforts">
      <textarea class="text-sm text-slate-600 border-b border-slate-100 focus:border-emerald-600 outline-none bg-transparent mb-2" rows="2">Protecting, Conserving, and Managing the Environment for Future Generations</textarea>
      <input type="date" class="text-xs text-slate-500 border-b border-slate-100 focus:border-emerald-600 outline-none bg-transparent mb-2" value="2026-03-26">
      <input type="file" class="text-xs mt-2">
      <div class="flex gap-2 mt-4">
        <button class="px-3 py-1 bg-emerald-700 text-white rounded text-xs font-bold uppercase tracking-widest hover:bg-emerald-800">Save</button>
        <button class="px-3 py-1 bg-rose-100 text-rose-700 rounded text-xs font-bold uppercase tracking-widest hover:bg-rose-200">Delete</button>
      </div>
    </div>
    <!-- Add more cards as needed -->
    <div class="flex items-center justify-center border-2 border-dashed border-emerald-300 rounded-lg cursor-pointer hover:bg-emerald-50 transition-colors">
      <button class="text-emerald-700 font-bold text-lg flex flex-col items-center py-8 w-full">
        <span class="material-icons-round text-4xl mb-2">add_circle</span>
        Add News Card
      </button>
    </div>
  </div>
</div>
{% endblock %}
