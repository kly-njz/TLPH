<!-- Floating Notification Icon (visible on all user pages) -->
<style>
.floating-notification-btn {
    position: fixed;
    top: 28px;
    right: 32px;
    z-index: 2000;
    background: #15803d;
    color: #fff;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transition: background 0.2s, box-shadow 0.2s;
    cursor: pointer;
}
.floating-notification-btn:hover {
    background: #166534;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
}
.floating-notification-badge {
    position: absolute;
    top: 7px;
    right: 7px;
    background: #dc2626;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    border-radius: 9999px;
    padding: 2px 7px;
    border: 2px solid #15803d;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
</style>


<div class="floating-notification-btn group" title="Notifications" onclick="openNotificationModal()">
        <i class="fa-solid fa-bell text-xl group-hover:text-yellow-300 transition"></i>
        <span class="floating-notification-badge">3</span>
</div>

<!-- Notification Modal -->
<div id="notificationModal" class="fixed inset-0 z-[3000] flex items-center justify-center bg-black/40 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-0 relative animate-fade-in">
        <button onclick="closeNotificationModal()" class="absolute top-3 right-3 text-green-700 hover:text-red-600 text-xl font-bold focus:outline-none" title="Close">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="p-6 border-b border-green-100 flex items-center gap-3">
            <i class="fa-solid fa-bell text-green-700 text-2xl"></i>
            <h2 class="text-xl font-black text-green-900 m-0 uppercase tracking-tight">Notifications</h2>
        </div>
        <div class="p-6 max-h-[60vh] overflow-y-auto space-y-4">
            <!-- Example notification cards (copy from notification.html) -->
            <div class="notification-card unread p-4 rounded-2xl flex gap-5 border border-green-100">
                <div class="flex-shrink-0 w-12 h-12 bg-green-50 text-green-700 rounded-xl flex items-center justify-center shadow-inner">
                    <span class="material-icons-round text-xl">notifications</span>
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-black text-green-700 uppercase tracking-widest bg-green-100/50 px-2 py-1 rounded">System</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase italic">Just now</span>
                    </div>
                    <h3 class="text-sm font-black text-green-900 m-0">Welcome to the DENR Portal!</h3>
                    <p class="text-xs text-slate-600 mt-1 leading-relaxed m-0 italic">You will receive important updates and alerts here.</p>
                </div>
            </div>
            <div class="notification-card p-4 rounded-2xl flex gap-5 border border-green-100">
                <div class="flex-shrink-0 w-12 h-12 bg-green-50 text-green-700 rounded-xl flex items-center justify-center shadow-inner">
                    <span class="material-icons-round text-xl">info</span>
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[9px] font-black text-blue-700 uppercase tracking-widest bg-blue-100/50 px-2 py-1 rounded">Application</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase italic">1 hour ago</span>
                    </div>
                    <h3 class="text-sm font-black text-green-900 m-0">Your application was received.</h3>
                    <p class="text-xs text-slate-600 mt-1 leading-relaxed m-0 italic">Thank you for submitting your application. We will review it soon.</p>
                </div>
            </div>
            <!-- Add more notification cards as needed -->
        </div>
    </div>
</div>
<script>
function openNotificationModal() {
    document.getElementById('notificationModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}
function closeNotificationModal() {
    document.getElementById('notificationModal').classList.add('hidden');
    document.body.style.overflow = '';
}
// Optional: Close modal on ESC key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeNotificationModal();
});
</script>
<!-- End Floating Notification Icon and Modal -->
