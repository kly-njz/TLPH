<!-- Floating Notification Icon (visible on all user pages) -->

<style>
.floating-notification-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 2000;
    background: rgba(255,255,255,0.18);
    color: #0e7490;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px 0 rgba(16, 185, 129, 0.18), 0 1.5px 8px 0 rgba(34,211,238,0.10);
    transition: box-shadow 0.2s, transform 0.18s, background 0.2s;
    cursor: pointer;
    backdrop-filter: blur(12px) saturate(180%);
    border: 1.5px solid rgba(255,255,255,0.35);
    animation: notif-float-in 0.5s cubic-bezier(.68,-0.55,.27,1.55);
    overflow: hidden;
}
.floating-notification-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(34,211,238,0.10) 100%);
    pointer-events: none;
    z-index: 1;
}
.floating-notification-btn:hover {
    background: rgba(255,255,255,0.28);
    box-shadow: 0 10px 32px 0 rgba(16, 185, 129, 0.28), 0 2px 12px 0 rgba(34,211,238,0.18);
    transform: scale(1.08) translateY(-2px);
}
.floating-notification-btn:active {
    transform: scale(0.97);
}
.floating-notification-btn i.fa-bell {
    font-size: 1.35rem;
    filter: drop-shadow(0 1px 3px #0e749055);
    transition: color 0.2s;
    z-index: 2;
}
.floating-notification-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: linear-gradient(90deg, #f43f5e 0%, #f59e42 100%);
    color: #fff;
    font-size: 10px;
    font-weight: bold;
    border-radius: 9999px;
    padding: 1.5px 6px;
    border: 1.5px solid #fff;
    box-shadow: 0 1px 4px rgba(244,63,94,0.13);
    letter-spacing: 0.3px;
    animation: notif-badge-pop 0.6s cubic-bezier(.68,-0.55,.27,1.55);
    z-index: 3;
}
@keyframes notif-float-in {
    0% { opacity: 0; transform: scale(0.7) translateY(60px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes notif-badge-pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}
@media (max-width: 600px) {
    .floating-notification-btn { right: 10px; bottom: 10px; width: 38px; height: 38px; }
    .floating-notification-badge { top: 2.5px; right: 2.5px; font-size: 8.5px; padding: 1px 4px; }
}
</style>


<div class="floating-notification-btn group" title="Notifications" onclick="openNotificationModal()">
        <i class="fa-solid fa-bell text-xl group-hover:text-yellow-300 transition"></i>
        <span class="floating-notification-badge">3</span>
</div>

<script>
function openNotificationModal() {
    document.getElementById('notificationModal').classList.remove('hidden');
    setTimeout(() => {
        document.addEventListener('mousedown', clickOutsideModal, true);
    }, 10);
}
function closeNotificationModal() {
    document.getElementById('notificationModal').classList.add('hidden');
    document.removeEventListener('mousedown', clickOutsideModal, true);
}
function clickOutsideModal(e) {
    const modal = document.getElementById('notificationModal');
    if (modal && !modal.contains(e.target) && !e.target.closest('.floating-notification-btn')) {
        closeNotificationModal();
    }
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeNotificationModal();
});
</script>
