<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock History | DENR Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }

        .log-card {
            transition: all 0.2s ease-in-out;
        }
        .log-card:hover {
            border-color: #059669 !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    {% include 'user/header.html' %}

    <main class="max-w-5xl mx-auto px-4 py-8 pb-20">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl md:text-3xl font-black text-emerald-950 uppercase tracking-tighter italic m-0">History Logs</h2>
                <p class="text-[9px] font-black text-emerald-600 uppercase tracking-[0.3em] mt-1">All Inventory Submissions</p>
            </div>
            <a href="/user/inventory" class="flex items-center gap-2 bg-white border border-slate-200 text-slate-500 hover:border-emerald-600 hover:text-emerald-700 px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest no-underline transition-all shadow-sm">
                <i class="fa-solid fa-arrow-left text-[9px]"></i> Back
            </a>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-16">
            <i class="fa-solid fa-spinner fa-spin text-3xl text-emerald-600"></i>
            <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-4">Loading history...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-100 rounded-full mb-4">
                <i class="fa-solid fa-clock-rotate-left text-3xl text-slate-300"></i>
            </div>
            <p class="text-slate-600 font-black uppercase text-sm mb-1">No submissions yet</p>
            <p class="text-slate-400 text-xs mb-6">Your inventory registration history will appear here</p>
            <a href="/user/inventory/add" class="inline-block bg-emerald-700 hover:bg-emerald-800 text-white px-6 py-2.5 rounded-xl font-black uppercase text-[10px] tracking-widest no-underline transition-all">
                <i class="fa-solid fa-plus mr-1"></i> Add First Entry
            </a>
        </div>

        <!-- History List -->
        <div id="historyList" class="hidden space-y-3"></div>

    </main>

    <script type="module">
        import { auth, db } from '/static/js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const loadingState = document.getElementById('loadingState');
        const emptyState   = document.getElementById('emptyState');
        const historyList  = document.getElementById('historyList');

        function formatDate(ts) {
            if (!ts) return '—';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function statusBadge(status) {
            const map = {
                approved:        { cls: 'bg-emerald-100 text-emerald-700 border-emerald-200', icon: 'fa-check-circle',   label: 'Approved' },
                active:          { cls: 'bg-emerald-100 text-emerald-700 border-emerald-200', icon: 'fa-check-circle',   label: 'Active' },
                pending_payment: { cls: 'bg-orange-100 text-orange-700 border-orange-200',   icon: 'fa-credit-card',     label: 'Pending Payment' },
                pending:         { cls: 'bg-yellow-100 text-yellow-700 border-yellow-200',   icon: 'fa-clock',           label: 'Pending' },
                rejected:        { cls: 'bg-red-100 text-red-700 border-red-200',            icon: 'fa-times-circle',    label: 'Rejected' },
            };
            const s = map[status] || map['pending'];
            return `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg border text-[9px] font-black uppercase ${s.cls}">
                        <i class="fa-solid ${s.icon} text-[8px]"></i>${s.label}
                    </span>`;
        }

        function createCard(item, index) {
            const shortId = item.id.substring(0, 8).toUpperCase();
            const sector  = (item.sector || item.category || 'general').replace(/_/g, ' ').toUpperCase();
            const stock   = Number(item.stockAvailable || 0).toLocaleString();
            const unit    = item.unitOfMeasure || 'pcs';
            const fee     = Number(item.registrationFee || 150).toLocaleString('en-PH', { minimumFractionDigits: 2 });
            const date    = formatDate(item.createdAt);

            return `
            <div class="log-card bg-white border border-slate-200 rounded-2xl p-4 md:p-5 shadow-sm cursor-pointer"
                 onclick="window.location.href='/user/inventory/stock-info/${item.id}'">
                <div class="flex flex-col md:flex-row md:items-center gap-4">

                    <!-- Left: name + id -->
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] font-black text-emerald-700 font-mono bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded">#DENR-${shortId}</span>
                            ${statusBadge(item.status)}
                        </div>
                        <h3 class="text-sm font-black text-slate-900 uppercase tracking-tight truncate m-0">${item.resourceName || 'Unnamed Resource'}</h3>
                        <p class="text-[9px] text-slate-400 font-bold uppercase m-0 mt-0.5">${sector}</p>
                    </div>

                    <!-- Mid: stats -->
                    <div class="grid grid-cols-3 gap-4 md:gap-8 border-t md:border-t-0 pt-3 md:pt-0 flex-shrink-0">
                        <div class="flex flex-col">
                            <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Date Filed</label>
                            <span class="text-[10px] font-bold text-slate-600 italic">${date}</span>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Stock Qty</label>
                            <span class="text-[11px] font-black text-slate-900">${stock} <small class="text-[9px] text-slate-400 font-normal">${unit}</small></span>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Reg. Fee</label>
                            <span class="text-[11px] font-black text-emerald-700">₱${fee}</span>
                        </div>
                    </div>

                    <!-- Right: view btn -->
                    <div class="flex-shrink-0">
                        <button class="text-[9px] font-black text-emerald-600 uppercase border border-emerald-200 bg-emerald-50 hover:bg-emerald-100 px-4 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                            <i class="fa-solid fa-arrow-right text-[8px]"></i> View
                        </button>
                    </div>

                </div>
            </div>`;
        }

        async function loadHistory(userId) {
            try {
                const q = query(
                    collection(db, 'inventory_registrations'),
                    where('userId', '==', userId)
                );
                const snap = await getDocs(q);

                loadingState.classList.add('hidden');

                if (snap.empty) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                const items = [];
                snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));

                // Sort newest first
                items.sort((a, b) => {
                    const at = a.createdAt?.toDate?.() || new Date(0);
                    const bt = b.createdAt?.toDate?.() || new Date(0);
                    return bt - at;
                });

                historyList.innerHTML = items.map((item, i) => createCard(item, i)).join('');
                historyList.classList.remove('hidden');

            } catch (err) {
                console.error('Error loading history:', err);
                loadingState.innerHTML = `
                    <div class="text-center py-16">
                        <i class="fa-solid fa-exclamation-triangle text-3xl text-red-400"></i>
                        <p class="text-red-500 font-bold uppercase text-xs mt-4">Failed to load history</p>
                        <p class="text-slate-400 text-xs mt-1">${err.message}</p>
                    </div>`;
            }
        }

        onAuthStateChanged(auth, user => {
            if (user) {
                loadHistory(user.uid);
            } else {
                window.location.href = '/login';
            }
        });

        // Show toast if redirected from successful payment
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('payment_success') === 'true') {
                const toast = document.createElement('div');
                toast.className = 'fixed top-4 right-4 z-[9999] bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-xl flex items-center gap-3 max-w-sm';
                toast.innerHTML = `<i class="fa-solid fa-check-circle text-xl"></i>
                    <span class="text-sm font-semibold">Payment successful! Your submission is under review.</span>
                    <button onclick="this.parentElement.remove()" class="ml-2 text-white/80 hover:text-white"><i class="fa-solid fa-times text-xs"></i></button>`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 6000);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
    </script>
</body>
</html>
