<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications | DENR</title>
    
    {% set required_role = 'user' %}
    {% include 'auth_check.html' %}
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
</head>

<body class="bg-gray-50 min-h-screen text-slate-900">
    {% include 'user/header.html' %}

    <div class="container mx-auto px-4 sm:px-6 mt-6 md:mt-10">
        <div class="max-w-5xl mx-auto">
            
            <div class="text-center mb-6 md:mb-10">
                <h1 class="text-2xl md:text-4xl font-black uppercase tracking-tight mb-2 text-green-800">
                    My Applications
                </h1>
                <p class="text-gray-500 font-bold uppercase tracking-widest text-[9px] md:text-xs">
                    Track your application status and history
                </p>
            </div>

            <div class="flex justify-center mb-8">
                <a href="/user/application/apply" 
                   class="w-full sm:w-auto bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-10 rounded-xl shadow-md transition-all transform active:scale-95 uppercase tracking-widest no-underline text-center text-xs md:text-sm">
                    <i class="fa-solid fa-plus mr-2"></i> New Application
                </a>
            </div>

            <div id="applicationsContainer" class="space-y-4">
                <div id="loadingState" class="text-center py-16">
                    <i class="fa-solid fa-spinner fa-spin text-3xl md:text-4xl text-green-700"></i>
                    <p class="text-gray-400 mt-4 font-bold uppercase tracking-wider text-[10px]">Loading records...</p>
                </div>

                <div id="emptyState" class="hidden text-center py-16 bg-white rounded-2xl border border-dashed border-gray-300">
                    <i class="fa-solid fa-folder-open text-5xl text-gray-200 mb-4"></i>
                    <p class="text-gray-500 font-bold uppercase tracking-wider text-xs">No applications found</p>
                    <a href="/user/application/apply" class="inline-block mt-3 text-green-700 font-black uppercase text-[10px] hover:underline">
                        Start your first application →
                    </a>
                </div>

                <div id="applicationsList" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>
    </div>

    <!-- Application Details Modal -->
    <div id="detailsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-gradient-to-r from-green-700 to-green-800 text-white p-6 border-b">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-black uppercase">Application Details</h2>
                    <button onclick="closeDetailsModal()" class="text-white hover:bg-green-600 p-2 rounded-lg transition">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
            </div>
            
            <div id="modalContent" class="p-6 space-y-6">
                <!-- Content will be populated by JavaScript -->
            </div>
            
            <div class="border-t bg-gray-50 p-6 flex gap-3">
                <button onclick="closeDetailsModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '/static/js/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const applicationsList = document.getElementById('applicationsList');

        async function processPendingApplication() {
            try {
                const pendingAppData = localStorage.getItem('pendingApplication');
                if (pendingAppData) {
                    const appData = JSON.parse(pendingAppData);
                    const docRef = await addDoc(collection(db, 'applications'), {
                        ...appData,
                        status: 'under-review',
                        submittedAt: serverTimestamp(),
                        paymentStatus: 'completed'
                    });
                    
                    console.log('Application saved after payment with ID:', docRef.id);
                    localStorage.removeItem('pendingApplication');
                    alert('Payment successful! Your application has been submitted.');
                }
            } catch (error) {
                console.error('Error processing pending application:', error);
            }
        }

        const categoryLabels = {
            'farming': 'Crop & Plant',
            'livestock': 'Fisheries & Agriculture',
            'agribusiness': 'Agribusiness & Agro-Processing',
            'trade': 'Agricultural Trade',
            'infrastructure': 'Infrastructure'
        };

        function normalizeApplicationStatus(status) {
            const normalized = (status || '').toString().toLowerCase().trim();
            if (normalized === 'accepted') return 'approved';
            if (normalized === 'to-review') return 'under-review';
            if (normalized === 'submitted') return 'pending';
            if (normalized === 'forwarded-to-national') return 'forwarded';
            if (normalized === 'forwarded') return 'forwarded';
            return normalized || 'pending';
        }

        function getStatusBadge(status) {
            const baseClass = "px-2.5 py-1 rounded-lg text-[9px] md:text-[10px] font-black uppercase flex items-center gap-1.5 w-fit";
            const badges = {
                'pending': `<span class="${baseClass} bg-yellow-50 text-yellow-700 border border-yellow-200"><i class="fa-solid fa-circle-notch fa-spin"></i> Pending</span>`,
                'approved': `<span class="${baseClass} bg-green-50 text-green-700 border border-green-200"><i class="fa-solid fa-check-double"></i> Approved</span>`,
                'rejected': `<span class="${baseClass} bg-red-50 text-red-700 border border-red-200"><i class="fa-solid fa-ban"></i> Rejected</span>`,
                'under-review': `<span class="${baseClass} bg-blue-50 text-blue-700 border border-blue-200"><i class="fa-solid fa-magnifying-glass"></i> Reviewing</span>`,
                'forwarded': `<span class="${baseClass} bg-purple-50 text-purple-700 border border-purple-200"><i class="fa-solid fa-arrow-right-arrow-left"></i> Forwarded to National</span>`,
                'cancelled': `<span class="${baseClass} bg-gray-50 text-gray-700 border border-gray-200"><i class="fa-solid fa-ban"></i> Cancelled</span>`
            };
            const normalizedStatus = normalizeApplicationStatus(status);
            return badges[normalizedStatus] || badges['pending'];
        }

        function formatDate(timestamp) {
            if (!timestamp) return '---';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function loadApplications(userId) {
            const q = query(collection(db, 'applications'), where('userId', '==', userId));
            
            // Real-time listener - updates instantly when admin approves/rejects
            onSnapshot(q, (querySnapshot) => {
                loadingState.classList.add('hidden');

                if (querySnapshot.empty) {
                    emptyState.classList.remove('hidden');
                    applicationsList.innerHTML = '';
                    return;
                }

                emptyState.classList.add('hidden');
                const apps = [];
                querySnapshot.forEach(doc => apps.push({ id: doc.id, ...doc.data() }));
                apps.sort((a, b) => (b.submittedAt?.toDate?.() || 0) - (a.submittedAt?.toDate?.() || 0));

                applicationsList.innerHTML = apps.map(app => {
                    const ns = normalizeApplicationStatus(app.status);
                    const borderColor = ns === 'approved' ? 'border-l-green-500' :
                                        ns === 'rejected' ? 'border-l-red-500' :
                                        ns === 'forwarded' ? 'border-l-purple-500' :
                                        ns === 'cancelled' ? 'border-l-gray-400' : 'border-l-yellow-400';
                    return `
                    <div class="bg-white border border-gray-200 border-l-4 ${borderColor} rounded-xl p-4 md:p-5 hover:border-green-600 transition-all shadow-sm group">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            
                            <div class="flex-1 space-y-1">
                                <div class="flex items-center gap-2">
                                    <h3 class="text-xs md:text-sm font-black text-slate-800 uppercase tracking-tight leading-none">
                                        ${categoryLabels[app.category] || app.category}
                                    </h3>
                                    ${getStatusBadge(app.status)}
                                </div>
                                ${app.productName ? `<p class="text-[10px] md:text-[11px] font-bold text-slate-600">${app.productName}</p>` : ''}
                                <p class="text-[9px] md:text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                                    ID: ${app.id?.substring(0, 8) || 'N/A'} • Submitted ${formatDate(app.submittedAt)}
                                </p>
                            </div>

                            <div class="flex flex-col md:flex-row items-stretch md:items-center gap-3 md:gap-8 border-t md:border-t-0 pt-3 md:pt-0">
                                <div class="grid grid-cols-2 gap-4 md:flex md:gap-8">
                                    <div>
                                        <p class="text-[8px] md:text-[9px] text-gray-400 font-black uppercase tracking-tighter">Investment</p>
                                        <p class="text-xs md:text-sm font-black text-slate-700">₱${Number(app.investmentQty || 0).toLocaleString()}</p>
                                    </div>
                                    <div>
                                        <p class="text-[8px] md:text-[9px] text-gray-400 font-black uppercase tracking-tighter">Est. Harvest</p>
                                        <p class="text-xs md:text-sm font-black text-slate-700">${Number(app.harvestQty || 0).toLocaleString()} <span class="text-[9px]">QTY</span></p>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="viewDetails('${app.id}')" 
                                            class="flex-1 md:flex-none bg-slate-50 hover:bg-green-700 hover:text-white text-slate-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-arrow-right-long"></i> Details
                                    </button>
                                    ${['pending', 'under-review'].includes(normalizeApplicationStatus(app.status)) ? `
                                    <button onclick="cancelApplication('${app.id}')" 
                                            class="px-3 py-2 text-[10px] font-black uppercase tracking-wider text-red-600 hover:bg-red-50 rounded-lg transition border border-red-200">
                                        <i class="fa-solid fa-times mr-1"></i> Cancel
                                    </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');

            }, (error) => {
                console.error(error);
                loadingState.innerHTML = `<p class="text-red-500 font-bold uppercase text-xs">Error loading data</p>`;
            });
        }

        window.cancelApplication = async function(applicationId) {
            if (!confirm('Are you sure you want to cancel this application?')) {
                return;
            }
            
            try {
                const { doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
                
                const applicationRef = doc(db, 'applications', applicationId);
                await updateDoc(applicationRef, {
                    status: 'cancelled',
                    cancelledAt: new Date()
                });
                
                alert('Application cancelled successfully');
                const user = auth.currentUser;
                if (user) {
                    loadApplications(user.uid);
                }
            } catch (error) {
                console.error('Error cancelling application:', error);
                alert('Failed to cancel application: ' + error.message);
            }
        };

        window.viewDetails = async function(applicationId) {
            try {
                const applicationDoc = await getDoc(doc(db, 'applications', applicationId));
                if (!applicationDoc.exists()) {
                    alert('Application not found');
                    return;
                }
                
                const app = applicationDoc.data();
                const categoryLabels = {
                    'farming': 'Crop & Plant',
                    'livestock': 'Fisheries & Agriculture',
                    'agribusiness': 'Agribusiness & Agro-Processing',
                    'trade': 'Agricultural Trade',
                    'infrastructure': 'Infrastructure'
                };
                
                const categoryLabel = categoryLabels[app.category] || app.category || 'Application';
                const normalizedStatus = normalizeApplicationStatus(app.status);
                const statusBadgeClass = {
                    'approved': 'bg-green-100 text-green-700',
                    'pending': 'bg-yellow-100 text-yellow-700',
                    'under-review': 'bg-blue-100 text-blue-700',
                    'forwarded': 'bg-purple-100 text-purple-700',
                    'rejected': 'bg-red-100 text-red-700',
                    'cancelled': 'bg-gray-100 text-gray-700'
                };
                const statusClass = statusBadgeClass[normalizedStatus] || statusBadgeClass['pending'];
                const statusText = (normalizedStatus || 'Unknown').toUpperCase();
                
                const submittedDate = app.submittedAt ? new Date(app.submittedAt.toDate ? app.submittedAt.toDate() : app.submittedAt).toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' }) : 'N/A';
                
                const modalContent = document.getElementById('modalContent');
                modalContent.innerHTML = `
                    <div class="space-y-6">
                        ${normalizedStatus === 'approved' ? `
                        <div class="bg-green-600 text-white p-4 rounded-lg text-center">
                            <i class="fa-solid fa-check-circle text-2xl mb-1"></i>
                            <p class="font-black uppercase tracking-widest text-sm">Application Approved!</p>
                            <p class="text-xs opacity-80 mt-1">Your application has been successfully approved.</p>
                        </div>` : ''}
                        ${normalizedStatus === 'rejected' ? `
                        <div class="bg-red-600 text-white p-4 rounded-lg text-center">
                            <i class="fa-solid fa-times-circle text-2xl mb-1"></i>
                            <p class="font-black uppercase tracking-widest text-sm">Application Rejected</p>
                            <p class="text-xs opacity-80 mt-1">Please contact the municipal office for details.</p>
                        </div>` : ''}
                        <!-- Status Summary -->
                        <div class="bg-gray-50 p-4 rounded-lg border-l-4 border-green-700">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="text-sm font-bold text-gray-600 uppercase tracking-wider">Status</h3>
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${statusClass}">${statusText}</span>
                            </div>
                            <p class="text-xs text-gray-500">Submitted: ${submittedDate}</p>
                        </div>

                        <!-- Processing Stage -->
                        <div>
                            <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Processing Stage</p>
                            <div class="flex items-center gap-1 text-[10px] font-bold uppercase">
                                <span class="px-2 py-1 rounded ${app.status && app.status !== 'under-review' && app.status !== 'pending' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                    Municipal
                                </span>
                                <span class="text-gray-300">→</span>
                                <span class="px-2 py-1 rounded ${app.regionalStatus === 'approved' || app.regionalStatus === 'forwarded' ? 'bg-green-100 text-green-700' : app.status === 'forwarded-to-national' || app.nationalStatus ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">
                                    Regional
                                </span>
                                <span class="text-gray-300">→</span>
                                <span class="px-2 py-1 rounded ${app.nationalStatus === 'approved' ? 'bg-green-100 text-green-700' : app.nationalStatus === 'rejected' ? 'bg-red-100 text-red-700' : app.nationalStatus === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'}">
                                    National
                                </span>
                            </div>
                        </div>
                        
                        <!-- Application Information -->
                        <div class="space-y-4">
                            <div>
                                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Application ID</p>
                                <p class="text-sm font-mono text-gray-700 break-all">${applicationId}</p>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Category</p>
                                    <p class="text-sm font-semibold text-gray-800">${categoryLabel}</p>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Submitted</p>
                                    <p class="text-sm font-semibold text-gray-800">${submittedDate}</p>
                                </div>
                            </div>
                            
                            ${app.productName ? `
                            <div>
                                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Product/Project Name</p>
                                <p class="text-sm font-semibold text-gray-800">${app.productName}</p>
                            </div>
                            ` : ''}
                            
                            <div class="grid grid-cols-2 gap-4">
                                ${app.investmentQty ? `
                                <div>
                                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Investment</p>
                                    <p class="text-sm font-semibold text-green-700">₱${Number(app.investmentQty).toLocaleString()}</p>
                                </div>
                                ` : ''}
                                ${app.harvestQty ? `
                                <div>
                                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Est. Harvest Qty</p>
                                    <p class="text-sm font-semibold text-gray-800">${Number(app.harvestQty).toLocaleString()} units</p>
                                </div>
                                ` : ''}
                            </div>
                            
                            ${app.municipality ? `
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Municipality</p>
                                    <p class="text-sm font-semibold text-gray-800">${app.municipality}</p>
                                </div>
                                ${app.province ? `
                                <div>
                                    <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Province</p>
                                    <p class="text-sm font-semibold text-gray-800">${app.province}</p>
                                </div>
                                ` : ''}
                            </div>
                            ` : ''}
                        </div>
                        
                        <!-- Additional Notes -->
                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                            <p class="text-xs font-bold text-blue-900 uppercase tracking-wider mb-2">📋 Status Information</p>
                            <ul class="text-xs text-blue-800 space-y-1 list-disc list-inside">
                                ${normalizedStatus === 'approved' ? '<li>Your application has been approved. ✅</li>' : ''}
                                ${normalizedStatus === 'under-review' ? '<li>Your application is currently being reviewed by the office.</li>' : ''}
                                ${normalizedStatus === 'forwarded' ? '<li>Your application has been forwarded to the National Office for final review.</li>' : ''}
                                ${normalizedStatus === 'pending' ? '<li>Your application is waiting for review.</li>' : ''}
                                ${normalizedStatus === 'rejected' ? '<li>Your application has been rejected. Please contact the office for details.</li>' : ''}
                                ${normalizedStatus === 'cancelled' ? '<li>This application has been cancelled.</li>' : ''}
                            </ul>
                        </div>
                    </div>
                `;
                
                document.getElementById('detailsModal').classList.remove('hidden');
                document.getElementById('detailsModal').classList.add('flex');
            } catch (error) {
                console.error('Error loading application details:', error);
                alert('Error loading application details: ' + error.message);
            }
        };
        
        window.closeDetailsModal = function() {
            const modal = document.getElementById('detailsModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };
        
        // Close modal when clicking outside of it
        document.getElementById('detailsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                window.closeDetailsModal();
            }
        });
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !document.getElementById('detailsModal').classList.contains('hidden')) {
                window.closeDetailsModal();
            }
        });

        onAuthStateChanged(auth, async user => {
            if (user) {
                await processPendingApplication();
                loadApplications(user.uid);
            }
            else window.location.href = '/login';
        });
    </script>
</body>
</html>
