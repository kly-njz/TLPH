import { getFirestore, collection, query, getDocs, updateDoc, doc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  } catch (error) {

const db = window.db;

function leavePage() {
  return {
    leaveRecords: [],
    searchQuery: '',
    filterLeaveType: '',
    pendingCount: 0,
    activeCount: 0,
    showLedger: false,
    ledgerSearch: '',
    ledgerTypeFilter: '',
    showCreateModal: false,
    createSaving: false,
    createError: '',
    showReviewModal: false,
    selectedRecord: null,
    reviewRemarks: '',
    reviewSaving: false,
    createForm: {
      applicant_name: '',
      assignment: '',
      leave_type: 'Vacation Leave',
      from_date: '',
      to_date: '',
      days: '',
      reason: '',
      status: 'Pending',
      scope: 'NATIONAL',
      municipality: ''
    },
    get filteredLeave() {
      return this.leaveRecords.filter(record => {
        const matchSearch = !this.searchQuery || 
          (record.applicant_name && record.applicant_name.toLowerCase().includes(this.searchQuery.toLowerCase()));
        const matchType = !this.filterLeaveType || record.leave_type === this.filterLeaveType;
        return matchSearch && matchType;
      });
    },
    async loadData() {
      try {
        console.debug('[DEBUG] National Leave: Loading leave requests from Firestore...');
        const q = query(collection(db, 'leave-requests'));
        const querySnapshot = await getDocs(q);
        this.leaveRecords = [];
        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          data.id = docSnap.id;
          this.leaveRecords.push(data);
        });
        this.pendingCount = this.leaveRecords.filter(r => r.status === 'Pending').length;
        this.activeCount = this.leaveRecords.filter(r => r.status === 'Approved').length;
        console.debug(`[DEBUG] National Leave: Loaded ${this.leaveRecords.length} records. Pending: ${this.pendingCount}, Approved: ${this.activeCount}`);
      } catch (error) {
        console.error('[DEBUG] National Leave: Error loading leave data:', error);
        this.leaveRecords = [];
      }
    },
    openReview(record) {
      console.debug('[DEBUG] National Leave: Open review for record', record);
      this.selectedRecord = record;
      this.reviewRemarks = '';
      this.reviewError = '';
      this.reviewSaving = false;
      this.showReviewModal = true;
    },
    async submitReview(decision) {
      if (!this.selectedRecord) return;
      this.reviewError = '';
      this.reviewSaving = true;
      try {
        console.debug(`[DEBUG] National Leave: Submitting review for record ${this.selectedRecord.id}, decision: ${decision}`);
        const docRef = doc(db, 'leave-requests', this.selectedRecord.id);
        await updateDoc(docRef, { status: decision, remarks: this.reviewRemarks });
        // Update local state
        const idx = this.leaveRecords.findIndex(r => r.id === this.selectedRecord.id);
        if (idx !== -1) {
          this.leaveRecords[idx].status = decision;
          if (this.reviewRemarks) this.leaveRecords[idx].remarks = this.reviewRemarks;
        }
        this.pendingCount = this.leaveRecords.filter(r => r.status === 'Pending').length;
        this.activeCount = this.leaveRecords.filter(r => r.status === 'Approved').length;
        this.showReviewModal = false;
        console.debug(`[DEBUG] National Leave: Review submitted for record ${this.selectedRecord.id}`);
      } catch (e) {
        this.reviewError = 'Network error. Please try again.';
        console.error('[DEBUG] National Leave: Error submitting review:', e);
      }
      this.reviewSaving = false;
    },
    async submitLeave() {
      this.createError = '';
      if (!this.createForm.applicant_name || !this.createForm.leave_type || !this.createForm.from_date || !this.createForm.to_date) {
        this.createError = 'Please fill in all required fields.';
        return;
      }
      this.createSaving = true;
      try {
        console.debug('[DEBUG] National Leave: Submitting new leave request', this.createForm);
        const colRef = collection(db, 'leave-requests');
        await colRef.add(this.createForm);
        await this.loadData();
        this.showCreateModal = false;
        this.resetCreateForm();
        console.debug('[DEBUG] National Leave: New leave request submitted');
      } catch (e) {
        this.createError = 'Network error. Please try again.';
        console.error('[DEBUG] National Leave: Error submitting leave request:', e);
      }
      this.createSaving = false;
    },
    resetCreateForm() {
      this.createForm = { applicant_name: '', assignment: '', leave_type: 'Vacation Leave', from_date: '', to_date: '', days: '', reason: '', status: 'Pending', scope: 'NATIONAL', municipality: '' };
      this.createError = '';
      this.createSaving = false;
      console.debug('[DEBUG] National Leave: Create form reset');
    }
  };
}
document.addEventListener('alpine:init', () => {
  Alpine.data('leavePage', leavePage);
});
</script>

<script>
  // Filtering Logic for Table
  function filterTable() {
    const query = document.getElementById('searchLeave').value.toLowerCase().trim();
    const typeFilter = document.getElementById('typeFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;
    
    const rows = document.querySelectorAll('.leave-row');
    let visibleCount = 0;

    rows.forEach(row => {
      const text = row.innerText.toLowerCase();
      const type = row.getAttribute('data-type') || '';
      const status = row.getAttribute('data-status') || '';
      
      const matchQuery = text.includes(query);
      const matchType = !typeFilter || type === typeFilter;
      const matchStatus = !statusFilter || status === statusFilter;

      if (matchQuery && matchType && matchStatus) {
          row.style.display = '';
          visibleCount++;
      } else {
          row.style.display = 'none';
      }
    });

    document.getElementById('recordCount').innerText = visibleCount;
  }

  function resetFilters() {
      document.getElementById('searchLeave').value = '';
      document.getElementById('typeFilter').value = '';
      document.getElementById('statusFilter').value = '';
      filterTable();
  }

  function generateLeaveReport(reportData) {
    const rows = Array.from(document.querySelectorAll('.leave-row'));
    const selectedStatus = (reportData.status || 'All').toLowerCase();
    const selectedType = (reportData.type || 'All').toLowerCase();
    const dateFrom = reportData.dateFrom ? new Date(reportData.dateFrom + 'T00:00:00') : null;
    const dateTo = reportData.dateTo ? new Date(reportData.dateTo + 'T23:59:59') : null;
    const format = (reportData.format || 'CSV').toLowerCase();

    const filtered = rows.filter((row) => {
      const data = row.dataset;
      const status = (data.status || '').toLowerCase();
      const type = (data.type || '').toLowerCase();

      const dateFiledCell = row.querySelector('td');
      const dateFiledText = dateFiledCell ? dateFiledCell.textContent.trim() : '';
      const dateFiled = dateFiledText ? new Date(dateFiledText + 'T00:00:00') : null;

      const statusOk = selectedStatus === 'all' || status === selectedStatus;
      const typeOk = selectedType === 'all' || type === selectedType;
      const fromOk = !dateFrom || (dateFiled && dateFiled >= dateFrom);
      const toOk = !dateTo || (dateFiled && dateFiled <= dateTo);

      return statusOk && typeOk && fromOk && toOk;
    });

    const headers = [
      'Date Filed',
      'Applicant',
      'Position',
      'Office',
      'Leave Type',
      'Where Leave Will Be Spent',
      'Commutation',
      'Working Days',
      'Inclusive Dates',
      'Status',
      'Application No',
      'Remarks'
    ];

    const records = filtered.map((row) => {
      const data = row.dataset;
      const dateFiledCell = row.querySelector('td');
      const dateFiledText = dateFiledCell ? dateFiledCell.textContent.trim() : '';
      return [
        dateFiledText,
        data.applicantName || '',
        data.position || '',
        data.office || '',
        data.leaveType || '',
        data.leaveWhere || '',
        data.commutation || '',
        data.workingDays || '',
        data.inclusiveDates || '',
        data.status || '',
        data.applicationNo || '',
        data.remarks || ''
      ];
    });

    const baseName = 'leave-report-' + new Date().toISOString().slice(0, 10);

    if (format === 'excel') {
      downloadExcel(headers, records, baseName + '.xls');
    } else {
      downloadCsv(headers, records, baseName + '.csv');
    }
  }

  function downloadCsv(headers, rows, filename) {
    const escapeValue = (value) => {
      const str = String(value ?? '');
      if (str.includes('"') || str.includes(',') || str.includes('\n') || str.includes('\r')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    };

    const lines = [headers, ...rows].map((row) => row.map(escapeValue).join(','));
    const csv = lines.join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function downloadExcel(headers, rows, filename) {
    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');

    const headerRow = '<tr>' + headers.map((h) => '<th>' + escapeHtml(h) + '</th>').join('') + '</tr>';
    const bodyRows = rows
      .map((row) => '<tr>' + row.map((cell) => '<td>' + escapeHtml(cell) + '</td>').join('') + '</tr>')
      .join('');

    const table = '<table>' + headerRow + bodyRows + '</table>';
    const html = `
      <html>
        <head><meta charset="utf-8" /></head>
        <body>${table}</body>
      </html>
    `;

    const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }
</script>
