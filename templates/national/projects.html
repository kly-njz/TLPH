{% include 'national/sidenav-national.html' %}
<main class="p-5 pt-[92px] lg:ml-[260px]">
  <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
    <h1 class="text-xl font-black text-slate-900 mb-2 flex items-center gap-2">
      <span class="material-icons-round text-blue-700">folder_special</span> Projects
    </h1>
    <p class="text-sm text-slate-600 mb-4">National-level project management and tracking.</p>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-100 border-b-2 border-slate-300">
          <tr>
            <th class="px-4 py-2.5 text-xs font-black uppercase text-slate-600">Project Name</th>
            <th class="px-4 py-2.5 text-xs font-black uppercase text-slate-600">Region</th>
            <th class="px-4 py-2.5 text-xs font-black uppercase text-slate-600">Status</th>
            <th class="px-4 py-2.5 text-xs font-black uppercase text-slate-600">Start Date</th>
          </tr>
        </thead>
        <tbody class="text-xs">
          <tr class="border-b border-slate-200 hover:bg-slate-50">
            <td class="py-2.5 px-4 font-bold text-slate-900">Mangrove Restoration</td>
            <td class="py-2.5 px-4 text-blue-700 font-black">Region IV-A</td>
            <td class="py-2.5 px-4"><span class="px-2 py-0.5 bg-green-50 text-green-700 border border-green-200 rounded-xl font-black text-[9px] uppercase">In Progress</span></td>
            <td class="py-2.5 px-4 text-slate-700">2026-01-10</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
