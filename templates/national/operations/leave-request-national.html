{% extends 'base.html' %}
{% block title %}Leave Requests | National Admin{% endblock %}
{% block content %}
<div class="flex-1 flex overflow-hidden">
    <aside class="sidebar-container hidden lg:block">
        {% if 'national' in request.path %}
            {% include 'national/sidenav-national.html' %}
        {% endif %}
    </aside>
    <main class="flex-1 flex flex-col min-w-0 bg-slate-100 p-3 gap-3 overflow-y-auto custom-scrollbar" x-data="leavePage()" x-init="loadData()">
        {% block leave_content %}{% endblock %}
    </main>
</div>
{% endblock %}
