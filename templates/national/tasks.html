{% include 'national/sidenav-national.html' %}
<main class="p-5 pt-[92px] lg:ml-[260px]">
  <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
    <h1 class="text-xl font-black text-slate-900 mb-2 flex items-center gap-2">
      <span class="material-icons-round text-blue-700">task</span> Tasks
    </h1>
    <p class="text-sm text-slate-600 mb-4">National-level task management and assignment.</p>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-100 border-b-2 border-slate-300">
          <tr>
            <th class="px-4 py-2.5 text-xs font-black uppercase text-slate-600">Task</th>
            <th class="px-4 py-2.5 text-xs font-black uppercase text-slate-600">Assigned To</th>

          </tr>
        </thead>
        <tbody class="text-xs">
          <tr class="border-b border-slate-200 hover:bg-slate-50">
            <td class="py-2.5 px-4 font-bold text-slate-900">Prepare Q1 Report</td>
            <td class="py-2.5 px-4 text-blue-700 font-black">National Accountant</td>
            <td class="py-2.5 px-4"><span class="px-2 py-0.5 bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-xl font-black text-[9px] uppercase">Pending</span></td>
            <td class="py-2.5 px-4 text-slate-700">2026-03-01</td>
          </tr>
        </tbody>
      </table>
    </div>
