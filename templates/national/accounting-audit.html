<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Audit Logs — National</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden flex flex-col relative">
    {% include 'national/sidenav-national.html' %}
    <main class="p-3 pt-[84px] sm:p-5 sm:pt-[92px] lg:ml-[260px] h-screen flex flex-col pb-3 relative z-10">
        <header class="bg-white border border-gray-200 p-3 flex flex-col sm:flex-row sm:items-center justify-between shadow-sm mb-3 rounded-xl shrink-0 gap-3">
            <div class="flex items-center gap-4">
                <div class="bg-slate-700 p-2.5 rounded-xl hidden sm:block">
                    <span class="material-icons-round text-white text-xl">history</span>
                </div>
                <div class="sm:border-l-2 sm:border-gray-200 sm:pl-4">
                    <h1 class="text-lg sm:text-xl font-black text-slate-900 uppercase tracking-tight leading-none">Audit Logs</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Complete accounting activity trail</p>
                </div>
            </div>
            <button onclick="exportLogs()" class="bg-slate-700 text-white px-4 py-1.5 text-[10px] font-black uppercase hover:bg-slate-800 transition rounded-xl shadow-sm flex items-center gap-1">
                <i class="fa-solid fa-download text-[10px]"></i> Export Logs
            </button>
        </header>
        <section class="bg-white border border-gray-200 rounded-xl p-3 mb-3 shrink-0">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-600 mb-1">User</label>
                    <select id="filterUser" class="w-full px-3 py-1.5 text-xs border border-gray-300 rounded-xl">
                        <option value="">All Users</option>
                        <option value="maria-santos">Maria Santos</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-600 mb-1">Entity</label>
                    <select id="filterEntity" class="w-full px-3 py-1.5 text-xs border border-gray-300 rounded-xl">
                        <option value="">All Entities</option>
                        <option value="ncr">NCR</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-600 mb-1">Action Type</label>
                    <select id="filterAction" class="w-full px-3 py-1.5 text-xs border border-gray-300 rounded-xl">
                        <option value="">All Actions</option>
                        <option value="create">Create</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-600 mb-1">From Date</label>
                    <input type="date" id="dateFrom" class="w-full px-3 py-1.5 text-xs border border-gray-300 rounded-xl">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-600 mb-1">To Date</label>
                    <input type="date" id="dateTo" class="w-full px-3 py-1.5 text-xs border border-gray-300 rounded-xl">
                </div>
            </div>
            <div class="flex gap-2 mt-3">
                <button onclick="applyFilters()" class="bg-slate-700 text-white px-4 py-1.5 text-[10px] font-black uppercase hover:bg-slate-800 transition rounded-xl shadow-sm">
                    Apply Filters
                </button>
                <button onclick="clearFilters()" class="bg-white border border-gray-300 text-slate-700 px-4 py-1.5 text-[10px] font-bold uppercase hover:bg-slate-50 transition rounded-xl shadow-sm">
                    Clear
                </button>
            </div>
        </section>
        <section class="flex-1 min-h-0 bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col">
            <div class="bg-slate-50 border-b border-gray-200 p-2.5 flex justify-between items-center shrink-0">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-600">Activity Log</h2>
                <span class="text-[10px] font-bold text-slate-500">Showing 247 entries</span>
            </div>
            <div class="flex-1 overflow-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 border-b-2 border-slate-300 sticky top-0 z-10">
                        <tr>
                            <th class="px-4 py-2.5 uppercase tracking-widest text-[10px] font-black text-slate-600">Timestamp</th>
                            <th class="px-4 py-2.5 uppercase tracking-widest text-[10px] font-black text-slate-600">User</th>
                            <th class="px-4 py-2.5 uppercase tracking-widest text-[10px] font-black text-slate-600">Entity</th>
                            <th class="px-4 py-2.5 uppercase tracking-widest text-[10px] font-black text-slate-600">Action</th>
                            <th class="px-4 py-2.5 uppercase tracking-widest text-[10px] font-black text-slate-600">Details</th>
                            <th class="px-4 py-2.5 uppercase tracking-widest text-[10px] font-black text-slate-600">IP Address</th>
                        </tr>
                    </thead>
                    <tbody class="text-xs" id="auditTableBody">
                        <tr class="border-b border-slate-200 hover:bg-slate-50">
                            <td class="py-2.5 px-4 font-mono text-slate-600 whitespace-nowrap">2026-02-17 14:23:45</td>
                            <td class="py-2.5 px-4 font-bold text-slate-900">Maria Santos</td>
                            <td class="py-2.5 px-4 text-slate-700">NCR - Quezon City</td>
                            <td class="py-2.5 px-4"><span class="px-2 py-0.5 bg-green-50 text-green-700 border border-green-200 rounded-xl font-black text-[9px] uppercase">Approve</span></td>
                            <td class="py-2.5 px-4 text-slate-600">Approved JE-2026-00235 (₱125,450.00)</td>
                            <td class="py-2.5 px-4 font-mono text-slate-500 text-[10px]">192.168.1.45</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script>
        function applyFilters() { /* ... */ }
        function clearFilters() { /* ... */ }
        function exportLogs() { alert('Export audit logs to CSV/Excel'); }
    </script>
</body>
</html>
