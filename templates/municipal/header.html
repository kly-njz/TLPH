<header class="header-main border-b border-slate-300 bg-white flex items-center justify-between px-3">
    
    <div class="flex items-center gap-2 overflow-hidden shrink-0">
        <img src="/static/images/denr.jpg" alt="DENR" class="w-7 h-7 object-contain border border-slate-200 p-0.5 rounded-sm">
        <div class="flex flex-col justify-center overflow-hidden">
            <div class="flex items-center gap-2 whitespace-nowrap">
                <h1 class="text-[11px] font-black text-slate-900 uppercase tracking-tight m-0">DENR Portal</h1>
                <span class="text-slate-300 text-[10px]">|</span>
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest m-0">Municipal Management</p>
            </div>
            <p id="municipalityName" class="text-[10px] font-black text-emerald-800 uppercase tracking-wide m-0 leading-none mt-0.5">
                Loading...
            </p>
        </div>
    </div>

    <div class="flex items-center gap-3">
        
        <div class="relative hidden md:block w-40 shrink-0">
            <span class="material-icons-round absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" style="font-size: 14px;">search</span>
            <input type="text" placeholder="Search..." 
                   class="w-full bg-slate-50 border border-slate-300 rounded-sm py-0.5 pl-7 pr-2 text-[10px] focus:bg-white focus:border-emerald-700 outline-none">
        </div>
        
        <div class="relative shrink-0 flex items-center" x-data="notificationData()">
            <a href="/municipal/notification" 
               class="p-1 rounded-sm bg-slate-50 text-slate-500 hover:bg-slate-200 border border-slate-200 flex items-center justify-center no-underline transition-all">
                <span class="material-icons-round text-[18px]">notifications</span>
                <template x-if="count > 0">
                    <span class="absolute -top-1 -right-1 flex h-3 w-3 items-center justify-center rounded-full bg-red-600 text-[7px] font-bold text-white border border-white" x-text="count > 9 ? '9+' : count"></span>
                </template>
            </a>
        </div>

        <div class="relative shrink-0 flex items-center">
            <button onclick="toggleProfileDropdown(event)" id="profileBtn"
                    class="w-8 h-8 border border-slate-300 rounded-sm bg-white hover:border-emerald-800 overflow-hidden flex items-center justify-center p-0 cursor-pointer">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dave" alt="Profile" class="w-full h-full object-cover grayscale-[0.3] pointer-events-none">
            </button>           

            <div id="profileDropdown" 
                 class="hidden absolute right-0 top-full mt-1 w-48 bg-white border border-slate-400 rounded-0 shadow-xl z-[2000] overflow-hidden">
                <div class="px-2 py-1.5 bg-slate-100 border-b border-slate-300">
                    <p class="text-[9px] font-black text-slate-900 m-0 uppercase tracking-tighter leading-none">D. Administrator</p>
                    <p class="text-[8px] text-slate-500 m-0 mt-1 truncate opacity-70">admin.dave@denr.gov.ph</p>
                </div>
                <div class="flex flex-col">
                    <a href="/municipal/profile" class="flex items-center gap-2 px-2 py-2 text-[10px] font-bold text-slate-700 hover:bg-emerald-600 hover:text-white no-underline uppercase transition-colors">
                        <span class="material-icons-round text-sm">account_circle</span> Profile View
                    </a>
                    <button onclick="handleLogout()" class="w-full text-left flex items-center gap-2 px-2 py-2 text-[10px] font-bold text-red-700 hover:bg-red-700 hover:text-white transition-all border-0 bg-transparent cursor-pointer uppercase">
                        <span class="material-icons-round text-sm">logout</span> Sign Out
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>

<style>
    :root {
        --sidebar-width: 220px;
        --header-height: 42px; /* Super thin compact header */
    }

    body {
        font-family: 'Verdana', sans-serif !important;
        padding-left: var(--sidebar-width);
        padding-top: var(--header-height);
    }

    .header-main {
        height: var(--header-height);
        position: fixed;
        top: 0; right: 0; left: var(--sidebar-width);
        z-index: 1000;
    }

    /* Transition effect for dropdown */
    #profileDropdown.show { display: block !important; animation: fadeIn 0.1s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 1024px) {
        :root { --sidebar-width: 0px; }
        .header-main { left: 0 !important; }
    }
</style>

<script>
    // Fallback Alpine data provider used by notification badge in the header.
    // Some pages do not define notificationData(), which causes runtime errors.
    if (typeof window.notificationData !== 'function') {
        window.notificationData = function() {
            return {
                count: 0,
                async loadNotifications() {
                    this.count = 0;
                },
                init() {
                    this.loadNotifications();
                }
            };
        };
    }

    // Pure JS toggle function - Mas stable kaysa Alpine kung may script conflicts
    function toggleProfileDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('profileDropdown');
        dropdown.classList.toggle('hidden');
        dropdown.classList.toggle('show');
    }

    // Isara ang dropdown kapag nag-click sa labas
    window.onclick = function(event) {
        const dropdown = document.getElementById('profileDropdown');
        if (!event.target.matches('#profileBtn') && !dropdown.classList.contains('hidden')) {
            dropdown.classList.add('hidden');
            dropdown.classList.remove('show');
        }
    }

    // Logout function
    function handleLogout() {
        // Optional: Maglagay ng confirmation dialog bago mag-logout
        if (confirm("Are you sure you want to logout?")) {
            
            // Dito mo pwedeng i-clear ang localStorage o sessionStorage kung kailangan:
            // localStorage.removeItem('userToken');
            
            // Palitan ang URL na ito depende sa kung saan naka-route ang login page niyo
            window.location.href = '/login'; 
        }
    }

    // Load municipality name from backend context API
    async function loadMunicipalityName() {
        try {
            const response = await fetch('/municipal/api/context', {
                method: 'GET',
                headers: { 'Accept': 'application/json' },
                credentials: 'same-origin'
            });

            if (!response.ok) {
                document.getElementById('municipalityName').textContent = 'Municipality';
                return;
            }

            const data = await response.json();
            const municipality = (data && data.municipality) ? data.municipality : 'Municipality';
            document.getElementById('municipalityName').textContent = municipality + ' Municipality';
        } catch (error) {
            console.error('Error loading municipality name:', error);
            document.getElementById('municipalityName').textContent = 'Municipality';
        }
    }

    // Load municipality name when page loads
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadMunicipalityName);
    } else {
        loadMunicipalityName();
    }

</script>
