<!-- Toast Notification (Upper Center, Global) -->
<div x-data="window.globalToast = globalToast = globalToast || { show: false, type: 'success', message: '' }"
     x-show="globalToast.show"
     x-transition:enter="toast-enter-active" x-transition:leave="toast-exit-active"
     class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] max-w-sm w-full pointer-events-auto">
  <div :class="globalToast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-900' : 'bg-rose-50 border-rose-200 text-rose-900'"
       class="border-l-4 rounded-[2px] p-3 shadow-lg flex items-start gap-2">
    <span class="material-icons-round text-[18px]" x-text="globalToast.type === 'success' ? 'check_circle' : 'error'"></span>
    <div class="flex-1">
      <p class="text-[10px] font-black uppercase tracking-wide" x-text="globalToast.type === 'success' ? 'Success' : 'Error'"></p>
      <p class="text-[11px] font-medium mt-0.5" x-text="globalToast.message"></p>
    </div>
    <button @click="globalToast.show = false" class="text-current opacity-60 hover:opacity-100">
      <span class="material-icons-round text-[14px]">close</span>
    </button>
  </div>
</div>

<script>
// Global toast trigger function
window.showGlobalToast = function(type, message, duration = 3000) {
  if (!window.globalToast) window.globalToast = { show: false, type: 'success', message: '' };
  window.globalToast.type = type;
  window.globalToast.message = message;
  window.globalToast.show = true;
  setTimeout(() => { window.globalToast.show = false; }, duration);
};
</script>

<style>
.toast-enter { opacity: 0; transform: translateY(-10px); }
.toast-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease; }
.toast-exit { opacity: 1; transform: translateY(0); }
.toast-exit-active { opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
</style>
