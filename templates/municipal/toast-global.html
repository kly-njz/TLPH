
<!-- Toast Notification (Upper Center, Global) -->
<div x-data
     x-show="$store.globalToast.show"
     x-transition:enter="toast-enter-active" x-transition:leave="toast-exit-active"
     class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] max-w-sm w-full pointer-events-auto">
  <div :class="$store.globalToast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-900' : 'bg-rose-50 border-rose-200 text-rose-900'"
       class="border-l-4 rounded-[2px] p-3 shadow-lg flex items-start gap-2">
    <span class="material-icons-round text-[18px]" x-text="$store.globalToast.type === 'success' ? 'check_circle' : 'error'"></span>
    <div class="flex-1">
      <p class="text-[10px] font-black uppercase tracking-wide" x-text="$store.globalToast.type === 'success' ? 'Success' : 'Error'"></p>
      <p class="text-[11px] font-medium mt-0.5" x-text="$store.globalToast.message"></p>
    </div>
    <button @click="$store.globalToast.show = false" class="text-current opacity-70 hover:opacity-100 transition-opacity">
      <span class="material-icons-round text-[14px]">close</span>
    </button>
  </div>
</div>

<script>
// Alpine.js global store for toast
document.addEventListener('alpine:init', () => {
  if (!window.Alpine) return;
  Alpine.store('globalToast', {
    show: false,
    type: 'success',
    message: ''
  });
});
// Global toast trigger function
window.showGlobalToast = function(type, message, duration = 3000) {
  if (!window.Alpine || !Alpine.store('globalToast')) return;
  const toast = Alpine.store('globalToast');
  toast.type = type;
  toast.message = message;
  toast.show = true;
  if (toast._timeout) clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => { toast.show = false; }, duration);
};
</script>

<style>
.toast-enter { opacity: 0; transform: translateY(-10px); }
.toast-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease; }
.toast-exit { opacity: 1; transform: translateY(0); }
.toast-exit-active { opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; }
</style>
