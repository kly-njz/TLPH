<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Municipal Profile Update | DENR Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Firebase scripts -->
    <script type="module" src="/static/js/firebase-config.js"></script>
    <script type="module" src="/static/js/auth.js"></script>
</head>
<body class="bg-gray-50 min-h-screen text-slate-900 text-sm font-sans">
    <div class="container mx-auto px-2 lg:px-8 mt-8">
        <div class="max-w-2xl mx-auto bg-white border border-gray-200 rounded-xl shadow-sm p-6">
            <h1 class="text-xl font-black uppercase tracking-tight text-green-800 mb-4">Update Municipal Profile</h1>
            <form id="municipalUpdateForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Employee ID</label>
                        <input type="text" id="employeeId" name="employeeId" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Middle Name</label>
                        <input type="text" id="middleName" name="middleName" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Email</label>
                        <input type="email" id="email" name="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Municipality</label>
                        <input type="text" id="municipality" name="municipality" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Province</label>
                        <input type="text" id="province" name="province" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Phone</label>
                        <input type="text" id="phone" name="phone" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Status</label>
                        <input type="text" id="status" name="status" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-700 uppercase mb-1">Role</label>
                        <input type="text" id="role" name="role" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-xs font-medium bg-gray-50" required>
                    </div>
                </div>
                <button type="submit" class="mt-6 w-full bg-green-700 text-white font-black rounded-lg py-2 text-[12px] uppercase shadow-sm hover:bg-green-800 transition-all">Save Changes</button>
            </form>
            <div id="updateStatus" class="mt-4 text-center text-[10px] font-bold"></div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Load user data
            const db = window.db;
            const auth = window.auth;
            if (!db || !auth || !auth.currentUser) return;
            const userId = auth.currentUser.uid;
            const { doc, getDoc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
            const userDocRef = doc(db, 'users', userId);
            const docSnap = await getDoc(userDocRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('employeeId').value = data.employeeId || '';
                document.getElementById('firstName').value = data.firstName || '';
                document.getElementById('lastName').value = data.lastName || '';
                document.getElementById('middleName').value = data.middleName || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('municipality').value = data.municipality || '';
                document.getElementById('province').value = data.province || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('status').value = data.status || '';
                document.getElementById('role').value = data.role || '';
            }
            // Handle form submit
            document.getElementById('municipalUpdateForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const updateStatus = document.getElementById('updateStatus');
                try {
                    await updateDoc(userDocRef, {
                        employeeId: document.getElementById('employeeId').value,
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        middleName: document.getElementById('middleName').value,
                        email: document.getElementById('email').value,
                        municipality: document.getElementById('municipality').value,
                        province: document.getElementById('province').value,
                        phone: document.getElementById('phone').value,
                        status: document.getElementById('status').value,
                        role: document.getElementById('role').value,
                        id: document.getElementById('employeeId').value
                    });
                    updateStatus.textContent = 'Profile updated successfully!';
                    updateStatus.style.color = 'green';
                } catch (err) {
                    updateStatus.textContent = 'Failed to update profile: ' + err.message;
                    updateStatus.style.color = 'red';
                }
            });
        });
    </script>
</body>
</html>
