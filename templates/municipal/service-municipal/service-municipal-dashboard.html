<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DENR Dashboard | Official View</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            gov: ['Verdana', 'Arial', 'Tahoma', 'sans-serif'],
          },
          colors: {
            gov: {
              text: '#111827',
              muted: '#4b5563',
              border: '#d1d5db',
              bg: '#f3f4f6',
              panel: '#ffffff',
              primary: '#0f172a',
              focus: 'rgba(5, 150, 105, 0.18)',
            }
          },
          letterSpacing: {
            gov: '0.12em',
            gov2: '0.14em',
            gov3: '0.18em',
          }
        }
      }
    }
  </script>

  <style>
    @media print{
      .print\:hidden { display:none !important; }
      body{ background:#fff !important; }
      .print\:border { border:1px solid #999 !important; }
    }
  </style>
</head>

<body class="h-screen w-full bg-gov-bg font-gov text-gov-text flex flex-col overflow-hidden">

  <div
    class="pointer-events-none fixed inset-0 -z-10 bg-no-repeat opacity-[0.035]"
    style="background-image:url('/static/images/denr.jpg'); background-position:center 30%; background-size:520px;"
    aria-hidden="true"
  ></div>

  <div class="shrink-0">
    {% include 'municipal/header.html' %}
  </div>

  <div class="flex flex-1 overflow-hidden">
    {% include 'municipal/sidenav.html' %}

    <main class="flex-1 flex flex-col px-4 py-4 md:px-6 min-w-0 overflow-hidden">
      
      <div class="shrink-0 mb-3 flex items-end justify-between border-b-2 border-emerald-800 pb-2">
        <div>
          <h1 class="text-base font-bold uppercase tracking-gov3 text-gov-primary leading-none">
            DENR Dashboard
          </h1>
          <p class="mt-1.5 text-[10px] font-bold text-gov-muted uppercase tracking-gov2 leading-none">
            Official view • Municipal processing overview
          </p>
        </div>
      </div>

      <section class="shrink-0 grid gap-2 md:grid-cols-4 mb-3">
        <button class="group w-full rounded-[4px] border border-gov-border bg-gov-panel px-3 py-1.5 text-left shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all print:border" type="button">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="material-icons-round text-[18px] text-emerald-800">task_alt</span>
              <div>
                <p class="text-[9px] font-bold uppercase tracking-gov text-slate-600 leading-none">Accepted</p>
                <p class="mt-1 text-base font-bold text-slate-900 leading-none" id="statAccepted">0</p>
              </div>
            </div>
            <span class="material-icons-round text-[16px] text-slate-400 group-hover:text-emerald-700">chevron_right</span>
          </div>
        </button>

        <button class="group w-full rounded-[4px] border border-gov-border bg-gov-panel px-3 py-1.5 text-left shadow-sm focus:outline-none focus:ring-2 focus:ring-rose-500 transition-all print:border" type="button">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="material-icons-round text-[18px] text-rose-700">unpublished</span>
              <div>
                <p class="text-[9px] font-bold uppercase tracking-gov text-slate-600 leading-none">Rejected</p>
                <p class="mt-1 text-base font-bold text-slate-900 leading-none" id="statRejected">0</p>
              </div>
            </div>
            <span class="material-icons-round text-[16px] text-slate-400 group-hover:text-rose-700">chevron_right</span>
          </div>
        </button>

        <button class="group w-full rounded-[4px] border border-gov-border bg-gov-panel px-3 py-1.5 text-left shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all print:border" type="button">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="material-icons-round text-[18px] text-amber-700">pending_actions</span>
              <div>
                <p class="text-[9px] font-bold uppercase tracking-gov text-slate-600 leading-none">Pending</p>
                <p class="mt-1 text-base font-bold text-slate-900 leading-none" id="statPending">0</p>
              </div>
            </div>
            <span class="material-icons-round text-[16px] text-slate-400 group-hover:text-amber-700">chevron_right</span>
          </div>
        </button>

        <button class="group w-full rounded-[4px] border border-indigo-200 bg-indigo-50 px-3 py-1.5 text-left shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-all print:border" type="button">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="material-icons-round text-[18px] text-indigo-700">forward_to_inbox</span>
              <div>
                <p class="text-[9px] font-bold uppercase tracking-gov text-indigo-700 leading-none">Forwarded</p>
                <p class="mt-1 text-base font-bold text-indigo-900 leading-none" id="statForwarded">0</p>
              </div>
            </div>
            <span class="material-icons-round text-[16px] text-indigo-300 group-hover:text-indigo-700">chevron_right</span>
          </div>
        </button>
      </section>

      <section class="shrink-0 mb-3 rounded-[4px] border border-gov-border bg-gov-panel p-2 shadow-sm print:border">
        <div class="flex flex-col gap-2 md:flex-row md:items-center">
          
          <button id="btnAllTypes" class="print:hidden inline-flex items-center justify-center gap-2 rounded-[4px] border border-gov-primary bg-gov-primary px-3 py-1.5 text-[10px] font-bold uppercase tracking-gov text-white hover:brightness-105 focus:outline-none md:w-[130px]" type="button">
            All Types
          </button>

<div class="relative w-full md:w-[240px] shrink-0">
            <select id="categorySelect" class="w-full appearance-none rounded-[4px] border border-gov-border bg-slate-50 px-2 py-1.5 pr-8 text-[9px] font-bold uppercase tracking-[0.10em] text-slate-700 outline-none focus:border-emerald-600 focus:bg-white truncate">
              <option value="" selected>All Categories</option>
              <option value="Initial_Farm_Visit">Initial Farm Visit</option>
              <option value="Compliance_Inspection">Compliance Inspection</option>
              <option value="Disease/Pest_Investigation">Disease/Pest Investigation</option>
              <option value="Agribusiness_Agro_Processing">Agribusiness &amp; Agro-Processing</option>
              <option value="Soil/Crop_Evaluation">Soil/Crop Evaluation</option>
              <option value="Follow_Up_Visit">Follow Up Visit</option>
              
              <option value="Good_Agricultural_Practices_Training">Good Agricultural Practices (GAP) Training</option>
              
              <option value="Pest_Disease_Management_Seminar">Pest &amp; Disease Management Seminar</option>
              <option value="Safe_Pesticide_Handling_Training">Safe Pesticide Handling Training</option>
              <option value="Nursery/Propagation_Seminar">Nursery/Propagation Seminar</option>
              <option value="Regulatory_Compliance_Orientation">Regulatory Compliance Orientation</option>
              <option value="Input_Usage_Approval">Input Usage Approval</option>
              <option value="Chemical_Registration/Clearance">Chemical Registration/Clearance</option>
              <option value="Fertilizer_Recommendation">Fertilizer Recommendation</option>
              <option value="Pesticide_Recommendation">Pesticide Recommendation</option>
              <option value="Subsidy_Application">Subsidy Application</option>
              <option value="Grant_Assistance">Grant Assistance</option>
              <option value="Loan_Endorsement">Loan Endorsement</option>
              <option value="Crop_Insurance_Support">Crop Insurance Support</option>
              <option value="Startup_Expansion_Support">Startup/Expansion Support</option>
              <option value="Typhoon_Damage_Compensation">Typhoon Damage Compensation</option>
              <option value="Pest_Damage_Compensation">Pest Damage Compensation</option>
            </select>
            <span class="material-icons-round pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-[14px] text-slate-500">expand_more</span>
          </div>

          <div class="flex w-full flex-1 items-center gap-1 rounded-[4px] border border-gov-border bg-slate-50 px-2 py-1 focus-within:border-emerald-600 focus-within:bg-white">
            <span class="material-icons-round text-[14px] text-slate-500">search</span>
            <input
              id="searchInput"
              type="text"
              placeholder="Search reference or name..."
              class="w-full bg-transparent text-[10px] text-gov-text outline-none placeholder:font-semibold placeholder:text-slate-500"
            />
            <button id="btnSearch" class="print:hidden flex-none rounded-[3px] border border-gov-primary bg-gov-primary px-2 py-0.5 text-[9px] font-bold uppercase tracking-gov text-white hover:brightness-105 focus:outline-none" type="button">
              Search
            </button>
          </div>
        </div>

        <div class="mt-1.5 flex items-center justify-between border-t border-gray-200 pt-1.5 px-1">
          <p class="text-[9px] font-bold uppercase tracking-widest text-slate-600">
            Records: <span id="resultCount" class="font-black text-slate-900">0</span>
          </p>
          <button id="btnClear" class="print:hidden text-[9px] font-bold uppercase tracking-gov text-blue-700 hover:underline focus:outline-none" type="button">
            Clear Filters
          </button>
        </div>
      </section>

      <section class="flex-1 flex flex-col min-h-0 rounded-[4px] border border-gov-border bg-gov-panel shadow-sm overflow-hidden print:border">
        
        <div class="shrink-0 hidden grid-cols-12 gap-2 border-b-2 border-gray-400 bg-gray-200 px-3 py-1.5 text-[9px] font-bold uppercase tracking-gov2 text-gov-muted md:grid">
          <div class="col-span-4 truncate">Reference &amp; Applicant</div>
          <div class="col-span-3 truncate">Category</div>
          <div class="col-span-2 truncate">Date</div>
          <div class="col-span-2 truncate">Status</div>
          <div class="col-span-1 text-right truncate">Action</div>
        </div>

        <div id="rows" class="flex-1 overflow-y-auto bg-white"></div>
        
        <div id="emptyState" class="hidden flex-1 flex-col items-center justify-center p-6 text-center bg-gray-50 border-t border-dashed border-gray-300">
          <p class="text-[11px] font-bold uppercase tracking-gov text-slate-700">No matching records</p>
          <p class="mt-1 text-[10px] text-slate-500 font-semibold">Try a different search term or reset filters.</p>
        </div>
      </section>

    </main>
  </div>

  <script type="module">
    console.log('Script started');
    
    import { auth, db } from '/static/js/firebase-config.js';
    import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    
    console.log('Firebase modules loaded', db);

    let applicants = [];
    let currentAdminMunicipality = null;

    const rowsEl = document.getElementById("rows");
    const emptyEl = document.getElementById("emptyState");
    const resultCountEl = document.getElementById("resultCount");
    const categorySelect = document.getElementById("categorySelect");
    const searchInput = document.getElementById("searchInput");
    const btnSearch = document.getElementById("btnSearch");
    const btnAll = document.getElementById("btnAllTypes");
    const btnClear = document.getElementById("btnClear");
    const statAccepted = document.getElementById("statAccepted");
    const statRejected = document.getElementById("statRejected");
    const statPending = document.getElementById("statPending");

    async function loadServiceRequests() {
      try {
        const currentUser = auth.currentUser;
        if (!currentUser) {
          console.error('No user logged in');
          return;
        }
        
        const adminDoc = await getDoc(doc(db, 'users', currentUser.uid));
        if (adminDoc.exists()) {
          const adminData = adminDoc.data();
          currentAdminMunicipality = adminData.municipality;
        }
        
        const usersRef = collection(db, 'users');
        const usersSnapshot = await getDocs(usersRef);
        const usersMap = {};
        
        usersSnapshot.forEach(userDoc => {
          const userData = userDoc.data();
          usersMap[userDoc.id] = {
            name: `${userData.firstName || ''} ${userData.lastName || ''}`.trim() || userData.email || 'Unknown User',
            municipality: userData.municipality || null
          };
        });
        
        const serviceRequestsRef = collection(db, 'service_requests');
        const serviceRequestsSnapshot = await getDocs(serviceRequestsRef);
        
        applicants = [];
        let acceptedCount = 0;
        let rejectedCount = 0;
        let pendingCount = 0;
        let forwardedCount = 0;
        
        serviceRequestsSnapshot.forEach(docSnapshot => {
          const data = docSnapshot.data();
          const userInfo = usersMap[data.userId];
          const userName = userInfo?.name || 'Unknown User';
          const userMunicipality = userInfo?.municipality;
          
          // STRICT FILTERING: Only show service requests from users in the same municipality
          if (!currentAdminMunicipality || !userMunicipality) {
            return; // Skip if either municipality is not set
          }
          
          if (userMunicipality.toLowerCase() !== currentAdminMunicipality.toLowerCase()) {
            return; // Skip if municipalities don't match
          }
          
          let filedDate = 'N/A';
          let dateObj = new Date();
          const dateField = data.createdAt;
          if (dateField) {
            if (typeof dateField.toDate === 'function') {
              dateObj = dateField.toDate();
            } else if (typeof dateField === 'string') {
              dateObj = new Date(dateField);
            } else if (dateField.seconds) {
              dateObj = new Date(dateField.seconds * 1000);
            }
            filedDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
          }
          
          const status = (data.status || 'pending').toLowerCase();
          const paymentStatus = (data.paymentStatus || '').toLowerCase();
          
          const shouldInclude = 
            paymentStatus === 'completed' || 
            paymentStatus === 'paid' ||
            paymentStatus === 'free' ||
            status === 'approved' ||
            status === 'submitted' ||
            status === 'to-review' ||
            status === 'pending';
          
          if (!shouldInclude) return;
          
          let statusKey = 'pending';
          if (status === 'approved' || paymentStatus === 'completed' || paymentStatus === 'paid') {
            statusKey = 'accepted';
          } else if (status === 'rejected') {
            statusKey = 'rejected';
          } else if (status === 'to-review') {
            statusKey = 'forwarded';
          }
          
          let statusText = 'Pending Review';
          if (statusKey === 'accepted') {
            statusText = 'Accepted';
            acceptedCount++;
          } else if (statusKey === 'rejected') {
            statusText = 'Rejected';
            rejectedCount++;
          } else if (statusKey === 'forwarded') {
            statusText = 'Forwarded to Regional';
            forwardedCount++;
          } else {
            pendingCount++;
          }
          
          applicants.push({
            id: docSnapshot.id,
            name: userName,
            reference: `DENR-${dateObj.getFullYear()}-${docSnapshot.id.substring(0, 4).toUpperCase()}`,
            categoryLabel: data.serviceType || data.description || 'N/A',
            categoryValue: data.serviceType || '',
            filedDate: filedDate,
            status: statusText,
            statusKey: statusKey
          });
        });
        
        statAccepted.textContent = acceptedCount;
        statRejected.textContent = rejectedCount;
        statPending.textContent = pendingCount;
        const statFwd = document.getElementById('statForwarded');
        if (statFwd) statFwd.textContent = forwardedCount;
        
        applyFilters();
        
      } catch (error) {
        console.error('Error loading service requests:', error);
      }
    }

    function normalize(str) {
      return (str || "").toString().toLowerCase().trim();
    }

    function statusBadge(statusKey, statusText) {
      if (statusKey === "accepted") {
        return `<span class="inline-block rounded-[2px] border border-teal-300 bg-teal-50 px-1.5 py-0.5 text-[8px] font-bold uppercase tracking-widest text-teal-800">${statusText}</span>`;
      }
      if (statusKey === "rejected") {
        return `<span class="inline-block rounded-[2px] border border-rose-300 bg-rose-50 px-1.5 py-0.5 text-[8px] font-bold uppercase tracking-widest text-rose-800">${statusText}</span>`;
      }
      if (statusKey === "forwarded") {
        return `<span class="inline-block rounded-[2px] border border-indigo-300 bg-indigo-50 px-1.5 py-0.5 text-[8px] font-bold uppercase tracking-widest text-indigo-700">${statusText}</span>`;
      }
      return `<span class="inline-block rounded-[2px] border border-amber-300 bg-amber-50 px-1.5 py-0.5 text-[8px] font-bold uppercase tracking-widest text-amber-800">${statusText}</span>`;
    }

    function rowTemplate(a) {
      return `
        <div class="grid grid-cols-12 items-center gap-2 border-b border-gov-border bg-white px-3 py-1.5 hover:bg-emerald-50 print:border transition-colors">
          <div class="col-span-12 md:col-span-4 min-w-0 flex flex-col justify-center">
            <span class="text-[10px] font-bold text-slate-900 truncate">${a.name}</span>
            <span class="text-[8px] font-bold uppercase tracking-gov text-slate-500 truncate">${a.reference}</span>
          </div>

          <div class="col-span-12 md:col-span-3 min-w-0">
            <span class="text-[9px] font-semibold text-slate-700 truncate block">
              ${a.categoryLabel}
            </span>
          </div>

          <div class="col-span-12 md:col-span-2 min-w-0">
            <span class="text-[9px] font-bold text-slate-600 truncate block">${a.filedDate}</span>
          </div>

          <div class="col-span-12 md:col-span-2 min-w-0">
            ${statusBadge(a.statusKey, a.status)}
          </div>

          <div class="col-span-12 md:col-span-1 md:text-right">
            <button
              class="inline-flex items-center justify-center rounded-[2px] border border-gov-border bg-white px-2 py-0.5 text-[8px] font-bold uppercase tracking-widest text-slate-700 hover:bg-emerald-700 hover:text-white hover:border-emerald-700 focus:outline-none transition-all shadow-sm"
              type="button"
              onclick="window.location.href='/municipal/services/details/${a.id}'"
            >
              VIEW
            </button>
          </div>
        </div>
      `;
    }

    function applyFilters() {
      const q = normalize(searchInput.value);
      const cat = categorySelect.value; // Exact value mula sa dropdown (may underscores)

      const filtered = applicants.filter(a => {
        // Bulletproof check: Tatanggalin natin temporarily ang underscores at spaces 
        // habang nagko-compare para siguradong laging magmamatch.
        let matchesCategory = false;
        
        if (!cat) {
          matchesCategory = true;
        } else {
          // Linisin ang parehong string bago i-compare (hal. "Initial_Farm_Visit" nagiging "initialfarmvisit")
          const cleanCat = cat.toLowerCase().replace(/[_ \-]/g, '');
          const cleanData = (a.categoryValue || '').toLowerCase().replace(/[_ \-]/g, '');
          
          matchesCategory = (cleanCat === cleanData);
        }

        if (!q) return matchesCategory;

        const haystack = normalize(`${a.name} ${a.reference} ${a.filedDate} ${a.categoryLabel} ${a.status}`);
        return matchesCategory && haystack.includes(q);
      });

      render(filtered);
    }

    function render(list) {
      rowsEl.innerHTML = list.map(rowTemplate).join("");
      resultCountEl.textContent = String(list.length);

      const isEmpty = list.length === 0;
      emptyEl.classList.toggle("hidden", !isEmpty);
      rowsEl.classList.toggle("hidden", isEmpty);
    }

    function resetFilters() {
      categorySelect.value = "";
      searchInput.value = "";
      applyFilters();
    }

    searchInput.addEventListener("input", applyFilters);
    categorySelect.addEventListener("change", applyFilters);
    btnSearch.addEventListener("click", applyFilters);
    btnAll.addEventListener("click", resetFilters);
    btnClear.addEventListener("click", resetFilters);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loadServiceRequests();
      } else {
        window.location.href = '/login';
      }
    });
  </script>
</body>
</html>
