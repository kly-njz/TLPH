<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account Disabled | DENR Portal</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    body {
      background: #f8fafc;
      font-family: Verdana, Arial, Tahoma, sans-serif;
      color: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      max-width: 420px;
      padding: 2rem 2.5rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px #0001;
      text-align: center;
    }
    .title {
      font-size: 2rem;
      font-weight: bold;
      color: #b91c1c;
      margin-bottom: 1rem;
    }
    .badge {
      display: inline-block;
      background: #fef2f2;
      color: #b91c1c;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      font-weight: bold;
      margin-bottom: 1.5rem;
    }
    .contact {
      color: #64748b;
      font-size: 0.95rem;
    }
    .contact a {
      color: #2563eb;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="material-icons-round" style="font-size:3rem;color:#b91c1c;margin-bottom:1rem;">block</span>
    <div class="title">Your Account is Disabled</div>
    <p style="font-size:1.1rem;margin-bottom:1.5rem;">Please call customer service or go to the nearest DENR branch to resolve your account status.</p>
    <div class="badge">Access Denied</div>
    <div class="contact">
      If you believe this is a mistake, contact support at <a href="mailto:support@denr.gov.ph">support@denr.gov.ph</a>.
    </div>
  </div>
</body>
</html>
