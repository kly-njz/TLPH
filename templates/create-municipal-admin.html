<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Municipal Admin</title>
    <link rel="stylesheet" href="/static/css/create-municipal-admin.css">
</head>
<body>
    <div class="container">
        <h2>Create Municipal Admin Account</h2>
        <div id="message"></div>
        
        <div class="quick-create-box">
            <h3 class="quick-create-title">Quick Create All 3 Accounts:</h3>
            <button type="button" id="createAllBtn" class="quick-create-btn">Create Victoria, Naujan, Calapan</button>
        </div>
        
        <form id="createAdminForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="admin@municipality.gov.ph">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Min. 6 characters">
            </div>
            
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required placeholder="Enter first name" title="First Name">
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required placeholder="Enter last name" title="Last Name">
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" required placeholder="+63">
            </div>
            
            <div class="form-group">
                <label for="municipality">Municipality</label>
                <select id="municipality" required title="Municipality">
                    <option value="">Select Municipality</option>
                    <option value="Victoria">Victoria</option>
                    <option value="Naujan">Naujan</option>
                    <option value="Calapan City">Calapan City</option>
                </select>
            </div>
            
            <button type="submit">Create Municipal Admin</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from '/static/js/firebase-config.js';
        import { createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const form = document.getElementById('createAdminForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.innerHTML = '';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const phone = document.getElementById('phone').value;
            const municipality = document.getElementById('municipality').value;

            if (password.length < 6) {
                message.innerHTML = '<div class="error">Password must be at least 6 characters</div>';
                return;
            }

            try {
                // Create user with Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save municipal admin profile to Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    firstName: firstName,
                    lastName: lastName,
                    email: email,
                    phone: phone,
                    municipality: municipality,
                    province: 'Oriental Mindoro',
                    role: 'municipal',
                    applicationType: 'municipal',
                    status: 'active',
                    createdAt: new Date().toISOString()
                });

                message.innerHTML = `<div class="success">Successfully created ${municipality} Municipal Admin!</div>`;
                form.reset();
                
                // Sign out the newly created user so admin can create more accounts
                await auth.signOut();

            } catch (error) {
                console.error('Error creating admin:', error);
                message.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        });

        // Quick create all 3 municipal accounts
        document.getElementById('createAllBtn').addEventListener('click', async () => {
            const accounts = [
                { email: 'naujanmunicipal@gmail.com', password: '123456', firstName: 'Naujan', lastName: 'Municipal Admin', phone: '+63', municipality: 'Naujan' },
                { email: 'victoriamunicipality@gmail.com', password: '123456', firstName: 'Victoria', lastName: 'Municipal Admin', phone: '+63', municipality: 'Victoria' },
                { email: 'calapanmunicipality@gmail.com', password: '123456', firstName: 'Calapan City', lastName: 'Municipal Admin', phone: '+63', municipality: 'Calapan City' }
            ];

            message.innerHTML = '<div style="padding: 10px; background: #dbeafe; border-radius: 4px;">Creating accounts...</div>';

            for (const account of accounts) {
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, account.email, account.password);
                    const user = userCredential.user;

                    await setDoc(doc(db, 'users', user.uid), {
                        firstName: account.firstName,
                        lastName: account.lastName,
                        email: account.email,
                        phone: account.phone,
                        municipality: account.municipality,
                        province: 'Oriental Mindoro',
                        role: 'municipal',
                        applicationType: 'municipal',
                        status: 'active',
                        createdAt: new Date().toISOString()
                    });

                    console.log(`Created: ${account.municipality}`);
                    await auth.signOut();

                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') {
                        console.log(`${account.municipality} already exists`);
                    } else {
                        console.error(`Error creating ${account.municipality}:`, error);
                    }
                }
            }

            message.innerHTML = '<div class="success">Successfully created all 3 municipal admin accounts!<br>Victoria, Naujan, and Calapan admins are ready.</div>';
        });
    </script>
</body>
</html>
