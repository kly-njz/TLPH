<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regional Masterlist | DENR Oversight</title>

    <style>html{visibility:hidden;opacity:0}html.show{visibility:visible;opacity:1}</style>
    <script>
      (function() {
        fetch('/api/check-session', {method: 'GET', credentials: 'same-origin'})
          .then(r => r.json())
          .then(d => {
            if (d.authenticated && (d.role === 'regional' || d.role === 'regional_admin')) {
              document.documentElement.classList.add('show');
            } else {
              window.location.replace('/login');
            }
          })
          .catch(() => window.location.replace('/login'));
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/denr-print.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/regional-style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Government Standard Typography & Layout (STRICT COMPACT) */
        body { font-family: 'Verdana', 'Arial', sans-serif; background: #f1f5f9; font-size: 11px; margin: 0; color: #1e293b; }

        /* Compact Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }

        /* Gov UI Utilities */
        .gov-card { background: white; border: 1px solid #cbd5e1; border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .gov-input { padding: 4px 8px; font-size: 10px; font-weight: bold; border: 1px solid #cbd5e1; border-radius: 2px; background: white; outline: none; transition: border-color 0.2s; }
        .gov-input:focus { border-color: #1e40af; }
        .gov-btn { padding: 4px 12px; border-radius: 2px; font-weight: 700; text-transform: uppercase; font-size: 9px; letter-spacing: 0.05em; transition: all 0.2s; cursor: pointer; }

        /* Chart Containment */
        .chart-safe-zone { position: relative; flex: 1; min-height: 0; width: 100%; }
        .chart-container { position: absolute; inset: 0; }

        /* Dense Table Formatting */
        th { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #64748b; background: #f8fafc; border-bottom: 2px solid #e2e8f0; padding: 6px 8px !important; }
        td { padding: 6px 8px !important; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        /* Solid Print CSS */
        @media print {
            .no-print { display: none !important; }
            .print-wrapper { margin-left: 0 !important; padding: 0 !important; width: 100% !important; display: block !important; }
            .gov-card { border: none !important; box-shadow: none !important; }
            table { width: 100% !important; border-collapse: collapse !important; border: 1px solid #000 !important; }
            th, td { border: 1px solid #000 !important; color: #000 !important; padding: 6px !important; font-size: 10px !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
            tr { page-break-inside: avoid !important; }
        }
        .print-header { display: none; }
    </style>
</head>

<body class="text-slate-800 bg-slate-100 h-screen overflow-hidden flex flex-col" x-data="regionalAppMaster()" x-init="init()">
    
    <div class="pointer-events-none fixed inset-0 -z-10 bg-no-repeat opacity-[0.035]"
      style="background-image:url('/static/images/denr.jpg'); background-position:center 30%; background-size:520px;"
      aria-hidden="true"></div>

    <div class="no-print z-20">
      {% include 'regional/sidenav.html' %}
    </div>

    <div class="flex-1 flex flex-col min-w-0 lg:ml-[260px] h-screen transition-all print-wrapper">
      
      <main class="flex-1 flex flex-col min-w-0 p-3 gap-2 overflow-y-auto custom-scrollbar">

          <div class="print-header">
              <h4 class="font-bold uppercase m-0">Republic of the Philippines</h4>
              <h3 class="font-black uppercase m-0">Department of Environment and Natural Resources</h3>
              <p class="text-[10px] uppercase font-bold" x-text="`Region ${userRegion} (${userRegionName}) Regional Office`"></p>
              <hr style="border: 1px solid #000; margin: 15px 0;">
              <h5 class="font-black uppercase tracking-widest mt-4">Regional Application Masterlist Report</h5>
              <p class="text-[9px] italic" x-text="`Generated on: ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`"></p>
          </div>

          <header class="gov-card p-2 px-3 flex flex-col sm:flex-row sm:justify-between sm:items-center shrink-0 border-b-4 border-b-blue-900 mb-1 no-print">
              <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-[2px] bg-blue-900 flex items-center justify-center text-white shrink-0">
                      <span class="material-icons-round text-[18px]">folder_shared</span>
                  </div>
                  <div class="leading-tight">
                      <h1 class="text-[12px] font-black text-slate-900 uppercase tracking-tight m-0">Regional Application Masterlist</h1>
                      <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest m-0 mt-0.5" x-text="`Region ${userRegion} (${userRegionName}) Unified Monitoring System`"></p>
                  </div>
              </div>

              <div class="flex gap-1.5 mt-2 sm:mt-0">
                  <button @click="printReport()" class="gov-btn border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 shadow-sm flex items-center gap-1">
                      <span class="material-icons-round text-[14px]">print</span> Print Report
                  </button>
                  <button @click="alert('Exporting...')" class="gov-btn bg-blue-800 hover:bg-blue-900 text-white shadow-sm flex items-center gap-1">
                      <span class="material-icons-round text-[14px]">save_alt</span> Export Excel
                  </button>
              </div>
          </header>

          <section class="gov-card flex-1 flex flex-col min-h-[300px] overflow-hidden bg-white mt-1 no-print">
              
              <div class="p-2 border-b border-slate-200 shrink-0 flex flex-wrap gap-1.5 items-center justify-between bg-slate-50">
                  <div class="flex flex-wrap items-center gap-1.5">
                      <div class="relative min-w-[220px]">
                          <span class="material-icons-round absolute left-1.5 top-1/2 -translate-y-1/2 text-slate-400 text-[12px]">search</span>
                          <input type="text" x-model="searchQuery" class="gov-input pl-6 w-full" placeholder="Search Reference, Applicant, or Muni...">
                      </div>
                      
                      <select x-model="filterProvince" class="gov-input cursor-pointer min-w-[120px]">
                          <option value="ALL">All Provinces</option>
                          <template x-for="province in userProvinces" :key="province">
                              <option :value="province" x-text="province"></option>
                          </template>
                      </select>

                      <select x-model="filterStatus" class="gov-input cursor-pointer min-w-[160px]">
                          <option value="ALL">All Status</option>
                          <option value="to-review">For Regional Review</option>
                          <option value="pending">Pending Review</option>
                          <option value="under-review">Under Review</option>
                          <option value="approved">Approved by Regional</option>
                          <option value="forwarded-to-national">Forwarded to National</option>
                          <option value="approved-national">Approved by National</option>
                          <option value="rejected">Rejected</option>
                          <option value="cancelled">Cancelled</option>
                      </select>

                      <button @click="resetFilters()" class="px-2 py-0.5 bg-slate-200 border border-slate-300 text-slate-800 font-bold uppercase text-[9px] rounded-[2px] transition hover:bg-slate-300 shadow-sm">
                          Reset Filters
                      </button>
                  </div>
              </div>

              <div class="flex-1 overflow-auto custom-scrollbar relative">
                  <table class="w-full text-left border-collapse">
                      <thead class="sticky top-0 z-10 shadow-sm bg-slate-100">
                          <tr>
                              <th class="border-r border-slate-200">Reference No.</th>
                              <th class="border-r border-slate-200">Lugar (Prov)</th>
                              <th class="border-r border-slate-200">Municipality / City</th>
                              <th class="border-r border-slate-200">Applicant Name</th>
                              <th class="border-r border-slate-200">Permit Type</th>
                              <th class="border-r border-slate-200 text-center">Status</th>
                              <th class="text-center w-24 no-print">Review</th>
                          </tr>
                      </thead>
                      <tbody class="text-[10px] divide-y divide-slate-100">
                          
                          <template x-for="app in filteredApps" :key="app.id">
                              <tr class="hover:bg-blue-50 transition-all">
                                  <td class="px-4 py-3 align-middle font-black text-blue-900 uppercase border-r border-slate-100" x-text="app.ref"></td>
                                  <td class="px-4 py-3 align-middle font-bold text-[9px] uppercase text-slate-500 border-r border-slate-100" x-text="app.province"></td>
                                  <td class="px-4 py-3 align-middle font-bold uppercase text-slate-700 border-r border-slate-100" x-text="app.municipality"></td>
                                  <td class="px-4 py-3 align-middle font-black uppercase text-slate-900 border-r border-slate-100" x-text="app.applicant"></td>
                                  <td class="px-4 py-3 align-middle font-bold uppercase text-slate-600 border-r border-slate-100" x-text="app.category"></td>
                                  <td class="px-4 py-3 align-middle text-center border-r border-slate-100">
                                      <span class="inline-block px-1.5 py-0.5 rounded-[1px] font-black text-[8px] uppercase border text-center" 
                                            :class="getStatusClass(getStatusLabel(app).key)" x-text="getStatusLabel(app).text"></span>
                                  </td>
                                  <td class="px-4 py-3 align-middle text-center no-print">
                                      <a :href="'/regional/application-view/' + app.id" class="gov-btn bg-slate-800 hover:bg-slate-900 text-white shadow-sm inline-block px-3 py-1 text-[9px]">Open</a>
                                  </td>
                              </tr>
                          </template>

                          <template x-if="loading">
                              <tr>
                                  <td colspan="7" class="py-10 text-center bg-white">
                                      <div class="flex flex-col items-center justify-center opacity-60">
                                          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-900 mb-3"></div>
                                          <p class="font-black uppercase text-[10px] tracking-widest text-slate-600">Loading Applications...</p>
                                      </div>
                                  </td>
                              </tr>
                          </template>

                          <template x-if="!loading && filteredApps.length === 0">
                              <tr>
                                  <td colspan="7" class="py-10 text-center bg-white">
                                      <div class="flex flex-col items-center justify-center opacity-40">
                                          <span class="material-icons-round text-4xl mb-2 text-slate-400">folder_off</span>
                                          <p class="font-black uppercase text-[10px] tracking-widest text-slate-600">No Records Found</p>
                                          <p class="text-[9px] font-bold text-slate-500 mt-1 uppercase">Applications with "to-review" or "pending" status will appear here</p>
                                      </div>
                                  </td>
                              </tr>
                          </template>

                      </tbody>
                  </table>
              </div>
          </section>

          <p class="text-center text-[9px] text-slate-400 font-black uppercase tracking-[0.2em] mt-auto pt-2 no-print italic shrink-0" x-text="`DENR Region ${userRegion} (${userRegionName}) Regional Management Oversight • 2026`"></p>

        </main>
      </div>
    </div>

    <script type="module">
        import { auth, db } from '/static/js/firebase-config.js';
        import { collection, query, where, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // Expose to window for Alpine
        window.firebaseAuth = auth;
        window.firebaseDB = db;
        window.firebaseCollection = collection;
        window.firebaseQuery = query;
        window.firebaseWhere = where;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseGetDocs = getDocs;
        window.firebaseDoc = doc;
        window.firebaseGetDoc = getDoc;
        window.firebaseOnAuthStateChanged = onAuthStateChanged;
        console.log('Firebase modules loaded and exposed to window');
    </script>

    <script>
        document.addEventListener('alpine:init', () => {
            console.log('Alpine:init event fired, registering regionalAppMaster...');
            Alpine.data('regionalAppMaster', () => ({
                searchQuery: '',
                filterProvince: 'ALL',
                filterStatus: 'ALL',
                apps: [],
                loading: true,
                userRegion: '4B',
                userRegionName: 'MIMAROPA',
                userProvinces: [],
                
                async init() {
                    // Small delay to ensure module scripts attach to window object first
                    setTimeout(async () => {
                        if (!window.firebaseGetDoc) {
                            console.error("Firebase not loaded yet.");
                        }
                        await this.loadUserRegion();
                        await this.loadApplications();
                    }, 100);
                },
                
                async loadUserRegion() {
                    return new Promise((resolve) => {
                        window.firebaseOnAuthStateChanged(window.firebaseAuth, async (user) => {
                            if (user) {
                                try {
                                    const userDoc = await window.firebaseGetDoc(window.firebaseDoc(window.firebaseDB, 'users', user.uid));
                                    if (userDoc.exists()) {
                                        const userData = userDoc.data();
                                        this.userRegion = userData.region || '4B';
                                        this.userRegionName = userData.regionName || 'MIMAROPA';
                                        this.userProvinces = userData.provinces || ['MARINDUQUE', 'OCCIDENTAL MINDORO', 'ORIENTAL MINDORO', 'PALAWAN', 'ROMBLON'];
                                        console.log('User region loaded:', this.userRegion, this.userRegionName, this.userProvinces);
                                    }
                                } catch (error) {
                                    console.error('Error loading user region:', error);
                                }
                                resolve();
                            } else {
                                window.location.href = '/login';
                            }
                        });
                    });
                },
                
                async loadApplications() {
                    try {
                        console.log('==== REGIONAL APPLICATION LOADING ====');
                        
                        // Load all users to create a mapping
                        const usersRef = window.firebaseCollection(window.firebaseDB, 'users');
                        const usersSnapshot = await window.firebaseGetDocs(usersRef);
                        const usersMap = {};
                        
                        usersSnapshot.forEach(userDoc => {
                            const userData = userDoc.data();
                            usersMap[userDoc.id] = {
                                name: `${userData.firstName || ''} ${userData.lastName || ''}`.trim() || userData.email || 'Unknown User',
                                province: userData.province || null,
                                municipality: userData.municipality || null
                            };
                        });
                        
                        console.log('Users loaded:', Object.keys(usersMap).length);
                        
                        // Query applications with status 'to-review', 'pending', or 'under-review'
                        const q = window.firebaseQuery(
                            window.firebaseCollection(window.firebaseDB, 'applications'),
                            window.firebaseWhere('status', 'in', [
                                'to-review', 'pending', 'under-review',
                                'approved', 'rejected', 'forwarded-to-national', 'cancelled'
                            ])
                        );
                        
                        // Real-time listener
                        window.firebaseOnSnapshot(q, (snapshot) => {
                            this.apps = [];
                            
                            snapshot.forEach((doc) => {
                                const data = doc.data();
                                const userInfo = usersMap[data.userId];
                                const appProvince = (data.province || userInfo?.province || '').toUpperCase();
                                const appMunicipality = (data.municipality || userInfo?.municipality || 'N/A').toUpperCase();
                                const applicantName = (userInfo?.name || data.userName || 'Unknown').toUpperCase();
                                
                                // Only include applications from user's provinces
                                if (this.userProvinces.includes(appProvince)) {
                                    this.apps.push({
                                        id: doc.id,
                                        ref: doc.id.substring(0, 12).toUpperCase(),
                                        province: appProvince,
                                        municipality: appMunicipality,
                                        applicant: applicantName,
                                        category: (data.category || 'N/A').toUpperCase(),
                                        status: (data.status || 'pending').toLowerCase(),
                                        nationalStatus: (data.nationalStatus || '').toLowerCase(),
                                        regionalStatus: (data.regionalStatus || '').toLowerCase()
                                    });
                                }
                            });
                            
                            console.log(`✓ Loaded ${this.apps.length} applications for regional view`);
                            this.loading = false;
                        }, (error) => {
                            console.error('onSnapshot error:', error);
                            this.loading = false;
                            alert('Error listening to applications: ' + error.message);
                        });
                        
                    } catch (error) {
                        console.error('Error loading applications:', error);
                        this.loading = false;
                        alert('Error loading applications: ' + error.message);
                    }
                },
                
                get filteredApps() {
                    const filtered = this.apps.filter(i => {
                        const s = this.searchQuery.toLowerCase();
                        const matchesSearch = i.ref.toLowerCase().includes(s) || 
                                            i.applicant.toLowerCase().includes(s) || 
                                            i.municipality.toLowerCase().includes(s);
                        const matchesProv = this.filterProvince === 'ALL' || i.province === this.filterProvince;
                        const matchesStat = this.filterStatus === 'ALL' || this.getStatusLabel(i).key === this.filterStatus;
                        return matchesSearch && matchesProv && matchesStat;
                    });
                    return filtered;
                },
                
                getStatusClass(status) {
                    const colors = {
                        'pending':               'bg-amber-50 text-amber-700 border-amber-200',
                        'under-review':          'bg-blue-50 text-blue-700 border-blue-200',
                        'to-review':             'bg-indigo-50 text-indigo-700 border-indigo-200',
                        'approved':              'bg-emerald-50 text-emerald-700 border-emerald-200',
                        'rejected':              'bg-rose-50 text-rose-700 border-rose-200',
                        'forwarded-to-national': 'bg-purple-50 text-purple-700 border-purple-200',
                        'approved-national':     'bg-emerald-100 text-emerald-800 border-emerald-300',
                        'rejected-national':     'bg-rose-100 text-rose-800 border-rose-300',
                        'cancelled':             'bg-gray-100 text-gray-600 border-gray-300'
                    };
                    return colors[status] || 'bg-slate-50 text-slate-600 border-slate-200';
                },

                // Returns { text, key } for display in list rows
                getStatusLabel(app) {
                    const nat  = (app.nationalStatus || '').toLowerCase();
                    const reg  = (app.regionalStatus || '').toLowerCase();
                    const main = (app.status || '').toLowerCase();

                    if (nat === 'approved') return { text: 'Approved by National',   key: 'approved-national' };
                    if (nat === 'rejected') return { text: 'Rejected by National',   key: 'rejected-national' };
                    if (main === 'forwarded-to-national') return { text: 'Forwarded to National', key: 'forwarded-to-national' };
                    if (reg === 'approved' || main === 'approved') return { text: 'Approved by Regional', key: 'approved' };
                    if (reg === 'rejected' || main === 'rejected') return { text: 'Rejected',             key: 'rejected' };
                    if (main === 'under-review') return { text: 'Under Review',       key: 'under-review' };
                    if (main === 'to-review')    return { text: 'For Regional Review', key: 'to-review' };
                    if (main === 'cancelled')    return { text: 'Cancelled',           key: 'cancelled' };
                    return { text: 'Pending Review', key: 'pending' };
                },
                
                resetFilters() {
                    this.searchQuery = '';
                    this.filterProvince = 'ALL';
                    this.filterStatus = 'ALL';
                },
                
                printReport() {
                    setTimeout(() => { window.print(); }, 150);
                }
            }));
        });
    </script>
</body>
</html>
