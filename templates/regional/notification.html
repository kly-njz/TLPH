<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | DENR Regional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/regional-style.css') }}">
    <style>
        body { 
            background-color: #f1f5f9; 
            font-family: 'Verdana', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }
        .page-container {
            width: 100%;
            max-width: 1000px; 
            margin: 0 auto;
            padding: 3rem 2rem;
            transition: all 0.3s ease;
        }
        .notification-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 5px solid transparent; 
        }
        .notification-card.unread { 
            background-color: #ffffff; 
            border-left-color: #1e40af; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .notification-card:hover {
            transform: translateX(8px); 
            background-color: #e0e7ff; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (min-width: 1025px) {
            body { padding-left: 260px; }
            .page-container { padding: 4rem 3rem; }
        }
        @media (max-width: 1024px) {
            .page-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    {% include 'regional/sidenav-regional.html' %}
    <div class="page-container flex-grow">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-2 border-b border-slate-200">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-8 bg-blue-900 rounded-full"></div>
                    <h1 class="text-3xl font-black text-blue-950 m-0 uppercase tracking-tighter">System Notifications</h1>
                </div>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.3em] ml-5">Official Administrative Alerts & Updates</p>
            </div>
            <button class="bg-white border-2 border-slate-200 text-slate-600 px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm">
                Mark all as read
            </button>
        </div>
        <div class="flex items-center gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button class="bg-blue-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-md">All Alerts</button>
            <button class="bg-white border border-slate-200 text-slate-400 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-50 hover:text-blue-800 transition-all whitespace-nowrap">Applications</button>
            <button class="bg-white border border-slate-200 text-slate-400 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-50 hover:text-blue-800 transition-all whitespace-nowrap">Projects</button>
            <button class="bg-white border border-slate-200 text-slate-400 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-50 hover:text-blue-800 transition-all whitespace-nowrap">Services</button>
        </div>
        <!-- Example Notification Card -->
        <div class="notification-card unread p-4 mb-4 rounded shadow border-l-4 border-blue-900 flex items-start gap-3">
            <span class="material-icons-round text-blue-900">notifications</span>
            <div>
                <div class="font-bold text-sm text-blue-900">New Project Approval Required</div>
                <div class="text-xs text-slate-600">A new municipal project is pending your review. <span class="font-bold">View details in the Projects section.</span></div>
                <div class="text-[10px] text-slate-400 mt-1">2 minutes ago</div>
            </div>
        </div>
        <!-- End Example Notification Card -->
        <!-- More notifications would be rendered here dynamically -->
    </div>
</body>
</html>
