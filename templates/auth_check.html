<!-- Auth Check: Prevents flash of protected content -->
<style>
    body {
        visibility: hidden;
        opacity: 0;
    }
    body.auth-checked {
        visibility: visible;
        opacity: 1;
        transition: opacity 0.1s ease-in;
    }
</style>

<script type="module">
    // Immediate auth check to prevent content flash
    import { auth } from '/static/js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Check auth immediately
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // User is authenticated, show page
            document.body.classList.add('auth-checked');
        } else {
            // No auth, redirect to login immediately
            window.location.replace('/login');
        }
    });

    // Fallback timeout: if Firebase takes too long, check session
    setTimeout(() => {
        if (!document.body.classList.contains('auth-checked')) {
            // Server-side will handle redirect, but hide content
            window.location.replace('/login');
        }
    }, 500);
</script>
